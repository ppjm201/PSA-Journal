// ─── Insights Tab ─────────────────────────────────────────────────────────────

function InsightsTab({ logs, onEditEntry, onAddMissedDay }) {
  const n = logs.length;
  const [reportOpen, setReportOpen] = useState(false);
  const [reportStart, setReportStart] = useState("");
  const [reportEnd, setReportEnd] = useState("");
  const [patientName, setPatientName] = useState("");
  const [generating, setGenerating] = useState(false);

  // Initialise report defaults to last 3 months when dialog opens
  const openReport = () => {
    const today = new Date(todayStr()+"T12:00:00");
    const threeMonthsAgo = new Date(today);
    threeMonthsAgo.setMonth(threeMonthsAgo.getMonth() - 3);
    setReportEnd(today.toISOString().split("T")[0]);
    setReportStart(threeMonthsAgo.toISOString().split("T")[0]);
    setReportOpen(true);
  };

  const setPreset = (months) => {
    const today = new Date(todayStr()+"T12:00:00");
    const start = new Date(today);
    start.setMonth(start.getMonth() - months);
    setReportEnd(today.toISOString().split("T")[0]);
    setReportStart(start.toISOString().split("T")[0]);
  };

  const handleGenerate = () => {
    if (!reportStart || !reportEnd || reportStart > reportEnd) {
      alert("Please pick a valid date range.");
      return;
    }
    setGenerating(true);
    // Run in next tick so the UI can show "Generating…"
    setTimeout(() => {
      try {
        const doc = generateDoctorReport(logs, {
          startDate: reportStart,
          endDate: reportEnd,
          patientName: patientName.trim(),
        });
        const fname = `psa-report-${reportStart}-to-${reportEnd}.pdf`;
        doc.save(fname);
        setReportOpen(false);
      } catch (err) {
        alert("Sorry — something went wrong generating the report. " + (err.message || ""));
      } finally {
        setGenerating(false);
      }
    }, 50);
  };

  if (n < 5) return (
    <div style={{ padding:"40px 0" }}>
      <div style={{ textAlign:"center", marginBottom:24 }}>
        <div style={{ fontSize:52, marginBottom:14 }}>📊</div>
        <div style={{ fontFamily:"'Lora',serif", fontSize:20, color:"#1e3d2f", marginBottom:8 }}>Building your picture…</div>
        <div style={{ fontSize:14, color:"#9a9189", lineHeight:1.7, maxWidth:280, margin:"0 auto" }}>
          Insights unlock after 5 entries. You have {n} so far — keep logging!
        </div>
      </div>
      <Card style={{ background:"#F5F0EB", border:"none" }}>
        <div style={{ fontFamily:"'Lora',serif", fontWeight:700, marginBottom:8, color:"#1e3d2f" }}>What you'll see</div>
        <ul style={{ margin:0, padding:"0 0 0 18px", fontSize:13, color:"#7a7069", lineHeight:2 }}>
          <li>Pain trend over time</li>
          <li>Which foods correlate with worse days</li>
          <li>Impact of exercise, alcohol &amp; sleep</li>
          <li>Most consistently affected joints</li>
        </ul>
      </Card>
    </div>
  );

  const avge = arr => arr.length ? arr.reduce((s,x)=>s+x,0)/arr.length : null;
  const fmt  = v => v===null ? "–" : v.toFixed(1);

  // ─── Lag analysis helpers ─────────────────────────────────────────────────
  // Triggers in PsA often affect symptoms 1-3 days later, not same-day.
  // We check lags 0, 1, 2 days and report the strongest signal for each trigger.

  const byDate = {};
  logs.forEach(l => { byDate[l.date] = l; });

  const addDays = (dateStr, days) => {
    const d = new Date(dateStr + "T12:00:00");
    d.setDate(d.getDate() + days);
    return d.toISOString().split("T")[0];
  };

  const lagLabel = lag => lag === 0 ? "same day" : lag === 1 ? "next day" : `${lag} days later`;

  // Returns the lag (0–2) with the strongest pain effect for a given predicate
  const computeLagInsight = (predicate) => {
    const results = [0,1,2].map(lag => {
      const yes = [], no = [];
      logs.forEach(l => {
        const target = byDate[addDays(l.date, lag)];
        if (!target) return;          // missing day — can't compare
        (predicate(l) ? yes : no).push(target.overallPain);
      });
      if (yes.length < 3 || no.length < 3) return null;
      const a = avge(yes), b = avge(no);
      return { lag, diff: +(a-b).toFixed(1), nYes: yes.length, nNo: no.length };
    }).filter(Boolean);
    if (!results.length) return null;
    return results.reduce((best, r) => Math.abs(r.diff) > Math.abs(best.diff) ? r : best);
  };

  const trend = logs.slice(-21).map(l=>({ date:l.date.slice(5), pain:l.overallPain }));

  // Multi-metric trend (pain, fatigue, skin) over last 21 days
  const fatigueAvg = avge(logs.map(l=>l.fatigue||0));
  const skinAvg    = avge(logs.map(l=>l.skinFlare||0));

  // Morning soreness breakdown
  const morningCounts = [0,0,0,0];
  logs.forEach(l => { if (l.morning>=0 && l.morning<=3) morningCounts[l.morning]++; });
  const morningLogged = morningCounts[1] + morningCounts[2] + morningCounts[3];

  // Skin <-> joint correlation: does pain rise on skin flare days?
  const skinFlareDays   = logs.filter(l=>(l.skinFlare||0)>=2);
  const noSkinFlareDays = logs.filter(l=>(l.skinFlare||0)<2);
  const painOnSkin      = avge(skinFlareDays.map(l=>l.overallPain));
  const painOffSkin     = avge(noSkinFlareDays.map(l=>l.overallPain));

  // ─── Trend direction: rolling 28-day windows ──────────────────────────────
  // Compares the last 28 days (excluding today) against the 28 days before that.
  // - State 1 (<14 entries): hidden entirely
  // - State 2 (14–55 entries): "warming up" placeholder
  // - State 3 (56+ entries): real comparison

  const today = todayStr();
  const inWindow = (dateStr, fromDaysAgo, toDaysAgo) => {
    // fromDaysAgo > toDaysAgo (e.g. from=28, to=1 means days -1 to -28)
    const d = new Date(dateStr+"T12:00:00");
    const t = new Date(today+"T12:00:00");
    const diffDays = Math.round((t-d) / 86400000);
    return diffDays >= toDaysAgo && diffDays <= fromDaysAgo;
  };

  const recentEntries = logs.filter(l => inWindow(l.date, 28, 1));
  const priorEntries  = logs.filter(l => inWindow(l.date, 56, 29));

  const trendMetrics = [
    { key:"overallPain", label:"Pain",    color:pf(3), bg:pb(3) },
    { key:"fatigue",     label:"Fatigue", color:"#6A4C93", bg:"#EFE6F5" },
    { key:"skinFlare",   label:"Skin",    color:"#B85C38", bg:"#FFF0E8" },
    { key:"morning",     label:"Morning", color:"#E65100", bg:"#FFF3E0", max:3 },
  ].map(m => {
    const r = avge(recentEntries.map(l => l[m.key]||0));
    const p = avge(priorEntries.map(l => l[m.key]||0));
    if (r===null || p===null) return null;
    const diff = +(r-p).toFixed(2);
    // direction: stable if abs(diff) < 0.3 (or 0.2 for morning since scale is smaller)
    const threshold = m.max===3 ? 0.2 : 0.3;
    const dir = Math.abs(diff) < threshold ? "stable" : (diff < 0 ? "improving" : "worsening");
    return { ...m, recent:+r.toFixed(1), prior:+p.toFixed(1), diff, dir };
  }).filter(Boolean);

  const trendDataReliable = recentEntries.length >= 14 && priorEntries.length >= 14;

  const foodInsights = ALL_FOODS.map(food => {
    const best = computeLagInsight(l => (l.foods||[]).includes(food.id));
    return best ? { ...food, ...best } : null;
  }).filter(Boolean).sort((a,b) => Math.abs(b.diff) - Math.abs(a.diff));

  const exDays   = logs.filter(l=>l.exercise&&l.exercise!=="None");
  const noExDays = logs.filter(l=>!l.exercise||l.exercise==="None");
  const exAvg    = avge(exDays.map(l=>l.overallPain));
  const noExAvg  = avge(noExDays.map(l=>l.overallPain));

  const alcDays   = logs.filter(l=>(l.alcohol||0)>0);
  const noAlcDays = logs.filter(l=>(l.alcohol||0)===0);
  const alcAvg    = avge(alcDays.map(l=>l.overallPain));
  const noAlcAvg  = avge(noAlcDays.map(l=>l.overallPain));
  // Lag analysis for alcohol — known to often hit 24-48h later
  const alcLag    = computeLagInsight(l => (l.alcohol||0) > 0);

  const sleepBins = [
    {label:"< 6h", data:logs.filter(l=>l.sleep<6)},
    {label:"6–8h", data:logs.filter(l=>l.sleep>=6&&l.sleep<=8)},
    {label:"8h+",  data:logs.filter(l=>l.sleep>8)},
  ].map(b=>({label:b.label, avg:avge(b.data.map(l=>l.overallPain)), n:b.data.length})).filter(b=>b.n>0);

  const jointTotals = {};
  logs.forEach(l=>Object.entries(l.joints||{}).forEach(([id,pain])=>{
    if(!jointTotals[id]) jointTotals[id]=[];
    jointTotals[id].push(pain);
  }));
  const topJoints = JOINTS
    .map(j=>({...j, avg:avge(jointTotals[j.id]||[])}))
    .filter(j=>j.avg!==null&&j.avg>0)
    .sort((a,b)=>b.avg-a.avg).slice(0,6);

  const SB = ({label, value, sub, color="#2C5F4A", bg="#E8F5E9", delta, deltaInverted}) => {
    // delta: numeric change vs prior period. positive = went up, negative = went down.
    // deltaInverted: when true, "up is bad" (e.g. for pain). when false, "up is good".
    let deltaEl = null;
    if (delta !== undefined && delta !== null) {
      const isStable = Math.abs(delta) < 0.3;
      const isImprovement = !isStable && (deltaInverted ? delta < 0 : delta > 0);
      const dColor = isStable ? "#9a9189" : isImprovement ? "#2C5F4A" : "#C62828";
      const arrow = isStable ? "→" : delta > 0 ? "↑" : "↓";
      deltaEl = (
        <div style={{ fontSize:10, color:dColor, marginTop:3, fontWeight:600 }}>
          {arrow} {delta>0?"+":""}{delta.toFixed(1)} vs prior
        </div>
      );
    }
    return (
      <div style={{ flex:1, background:bg, borderRadius:12, padding:"14px 12px", textAlign:"center" }}>
        <div style={{ fontSize:26, fontWeight:800, fontFamily:"'Lora',serif", color, lineHeight:1 }}>{value}</div>
        <div style={{ fontSize:12, color, marginTop:4, fontWeight:600 }}>{label}</div>
        {sub && <div style={{ fontSize:11, color:"#9a9189", marginTop:2 }}>{sub}</div>}
        {deltaEl}
      </div>
    );
  };

  // ─── Period-over-period deltas for individual cards ───────────────────────────
  // Reuses the recent (last 28 days) and prior (29-56 days ago) buckets defined
  // earlier for the Trend Direction card. Only shown when both have ≥14 entries.

  const recentAvg = (key) => avge(recentEntries.map(l => l[key]||0));
  const priorAvg  = (key) => avge(priorEntries.map(l => l[key]||0));
  const computeDelta = (key) => {
    if (!trendDataReliable) return null;
    const r = recentAvg(key), p = priorAvg(key);
    if (r===null || p===null) return null;
    return +(r-p).toFixed(1);
  };

  const deltaPain    = computeDelta("overallPain");
  const deltaFatigue = computeDelta("fatigue");
  const deltaSkin    = computeDelta("skinFlare");

  // Morning soreness % — what % of recent entries had morning soreness logged at level 2 or 3?
  const stiffPctOf = (entries) => {
    const logged = entries.filter(l => l.morning >= 1 && l.morning <= 3);
    if (logged.length === 0) return null;
    const stiff  = logged.filter(l => l.morning >= 2).length;
    return (stiff / logged.length) * 100;
  };
  const stiffPctRecent = trendDataReliable ? stiffPctOf(recentEntries) : null;
  const stiffPctPrior  = trendDataReliable ? stiffPctOf(priorEntries)  : null;
  const deltaStiffPct  = (stiffPctRecent !== null && stiffPctPrior !== null)
    ? +(stiffPctRecent - stiffPctPrior).toFixed(0) : null;

  // Skin–joint connection: pain difference on flare days, comparison vs prior period
  const skinJointDiff = (entries) => {
    const flare = entries.filter(l => (l.skinFlare||0) >= 2);
    const clear = entries.filter(l => (l.skinFlare||0) < 2);
    if (flare.length < 2 || clear.length < 2) return null;
    return +(avge(flare.map(l=>l.overallPain)) - avge(clear.map(l=>l.overallPain))).toFixed(1);
  };
  const skinJointDiffRecent = trendDataReliable ? skinJointDiff(recentEntries) : null;
  const skinJointDiffPrior  = trendDataReliable ? skinJointDiff(priorEntries)  : null;
  const deltaSkinJoint = (skinJointDiffRecent !== null && skinJointDiffPrior !== null)
    ? +(skinJointDiffRecent - skinJointDiffPrior).toFixed(1) : null;

  return (
    <div>
      {/* Doctor Report button */}
      <button onClick={openReport} style={{
        width:"100%", padding:"14px 0", marginBottom:14,
        background:"#fff", color:"#2C5F4A",
        border:"2px solid #2C5F4A", borderRadius:13,
        fontSize:14, fontFamily:"'Lora',serif", fontWeight:700, cursor:"pointer",
        display:"flex", alignItems:"center", justifyContent:"center", gap:8,
      }}>
        <span style={{ fontSize:18 }}>📋</span>
        <span>Generate Doctor Report (PDF)</span>
      </button>

      {/* Report dialog */}
      {reportOpen && (
        <div onClick={() => !generating && setReportOpen(false)} style={{
          position:"fixed", inset:0, background:"rgba(30,61,47,.5)",
          display:"flex", alignItems:"center", justifyContent:"center",
          padding:16, zIndex:200,
        }}>
          <div onClick={e => e.stopPropagation()} style={{
            background:"#fff", borderRadius:16, padding:"22px 22px 18px",
            maxWidth:400, width:"100%", boxShadow:"0 10px 40px rgba(0,0,0,.25)",
          }}>
            <div style={{ fontFamily:"'Lora',serif", fontWeight:700, fontSize:18, color:"#1e3d2f", marginBottom:6 }}>
              📋 Generate Doctor Report
            </div>
            <div style={{ fontSize:12, color:"#9a9189", marginBottom:18, lineHeight:1.5 }}>
              Creates a multi-page PDF summary you can print or email to your rheumatologist.
            </div>

            <div style={{ marginBottom:14 }}>
              <div style={{ fontSize:12, color:"#7a7069", marginBottom:6, fontWeight:600 }}>Period</div>
              <div style={{ display:"flex", gap:6, marginBottom:10 }}>
                {[1,3,6,12].map(m => (
                  <button key={m} onClick={() => setPreset(m)} style={{
                    flex:1, padding:"7px 0", borderRadius:8,
                    border:"1.5px solid #E2D9CE", background:"#FAF7F2",
                    color:"#7a7069", cursor:"pointer", fontSize:12, fontWeight:600,
                  }}>{m === 12 ? "1y" : `${m}m`}</button>
                ))}
              </div>
              <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                <input type="date" value={reportStart} max={reportEnd}
                  onChange={e => setReportStart(e.target.value)}
                  style={{ flex:1, padding:"8px 10px", borderRadius:8,
                    border:"1.5px solid #E2D9CE", background:"#FAF7F2",
                    fontSize:13, color:"#1e3d2f", fontFamily:"inherit", outline:"none" }}/>
                <span style={{ fontSize:12, color:"#9a9189" }}>to</span>
                <input type="date" value={reportEnd} max={todayStr()} min={reportStart}
                  onChange={e => setReportEnd(e.target.value)}
                  style={{ flex:1, padding:"8px 10px", borderRadius:8,
                    border:"1.5px solid #E2D9CE", background:"#FAF7F2",
                    fontSize:13, color:"#1e3d2f", fontFamily:"inherit", outline:"none" }}/>
              </div>
            </div>

            <div style={{ marginBottom:18 }}>
              <div style={{ fontSize:12, color:"#7a7069", marginBottom:6, fontWeight:600 }}>
                Patient name <span style={{ color:"#9a9189", fontWeight:400 }}>(optional)</span>
              </div>
              <input type="text" value={patientName}
                onChange={e => setPatientName(e.target.value)}
                placeholder="Leave blank to omit"
                style={{ width:"100%", padding:"8px 10px", borderRadius:8,
                  border:"1.5px solid #E2D9CE", background:"#FAF7F2",
                  fontSize:13, color:"#1e3d2f", fontFamily:"inherit", outline:"none" }}/>
            </div>

            <div style={{ display:"flex", gap:10 }}>
              <button onClick={() => setReportOpen(false)} disabled={generating} style={{
                flex:1, padding:"11px 0", borderRadius:10,
                border:"1.5px solid #E2D9CE", background:"#fff",
                color:"#7a7069", cursor: generating ? "not-allowed" : "pointer",
                fontSize:13, fontWeight:600, opacity: generating ? .5 : 1,
              }}>Cancel</button>
              <button onClick={handleGenerate} disabled={generating} style={{
                flex:2, padding:"11px 0", borderRadius:10, border:"none",
                background: generating ? "#9aa39c" : "#2C5F4A",
                color:"#fff", cursor: generating ? "wait" : "pointer",
                fontSize:13, fontWeight:700, fontFamily:"'Lora',serif",
              }}>{generating ? "Generating PDF…" : "Download PDF"}</button>
            </div>
          </div>
        </div>
      )}

      <Card title="Pain Trend" emoji="📈">
        <PainTrendChart logs={logs}/>
      </Card>

      <Card title="Calendar View" emoji="🗓️">
        <CalendarHeatmap logs={logs} onEditEntry={onEditEntry} onAddMissedDay={onAddMissedDay}/>
      </Card>

      {/* Trend Direction — three states */}
      {n >= 14 && !trendDataReliable && (
        <Card title="Trend Direction" emoji="📈" style={{ background:"#F5F0EB", border:"1.5px dashed #C9BBAB" }}>
          <p style={{ fontSize:13, color:"#1e3d2f", lineHeight:1.6, margin:"0 0 10px" }}>
            This card unlocks at <strong>8 weeks of data</strong>, so we can fairly compare your last month against the previous month.
          </p>
          <div style={{ background:"#fff", borderRadius:9, padding:"10px 12px", marginBottom:10 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
              <span style={{ fontSize:12, color:"#7a7069" }}>Progress</span>
              <span style={{ fontSize:12, fontWeight:700, color:"#2C5F4A" }}>{n} / 56 days</span>
            </div>
            <div style={{ height:8, background:"#F0E8E0", borderRadius:4, overflow:"hidden" }}>
              <div style={{ width:`${Math.min(100,(n/56)*100)}%`, height:"100%",
                background:"linear-gradient(to right,#81C784,#2C5F4A)", borderRadius:4, transition:"width .3s" }}/>
            </div>
          </div>
          <p style={{ fontSize:12, color:"#9a9189", margin:0, fontStyle:"italic" }}>
            About <strong>{Math.max(1, 56-n)} more day{56-n===1?"":"s"}</strong> of logging to go. Once unlocked, you'll see whether pain, fatigue, skin and morning soreness are trending better or worse than the previous month.
          </p>
        </Card>
      )}

      {trendDataReliable && (
        <Card title="Trend Direction" emoji="📈">
          <p style={{ fontSize:12, color:"#9a9189", margin:"0 0 14px", lineHeight:1.6 }}>
            Last 28 days vs the previous 28 days. <span style={{ color:"#2C5F4A", fontWeight:600 }}>↘ improving</span> · <span style={{ color:"#9a9189" }}>→ stable</span> · <span style={{ color:"#C62828", fontWeight:600 }}>↗ worsening</span>
          </p>
          {trendMetrics.map(m => {
            const arrow = m.dir === "improving" ? "↘" : m.dir === "worsening" ? "↗" : "→";
            const arrowColor = m.dir === "improving" ? "#2C5F4A" : m.dir === "worsening" ? "#C62828" : "#9a9189";
            return (
              <div key={m.key} style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 0",
                borderBottom:"1px solid #F0E8E0" }}>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13, fontWeight:600, color:"#1e3d2f" }}>{m.label}</div>
                  <div style={{ fontSize:11, color:"#9a9189", marginTop:2 }}>
                    {m.recent} now · {m.prior} prior month
                  </div>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <span style={{ fontSize:22, fontWeight:800, color:arrowColor, lineHeight:1 }}>{arrow}</span>
                  <div style={{ textAlign:"right", minWidth:54 }}>
                    <div style={{ fontSize:14, fontWeight:700, color:arrowColor, lineHeight:1 }}>
                      {m.diff>0?"+":""}{m.diff}
                    </div>
                    <div style={{ fontSize:10, color:"#9a9189", marginTop:3, textTransform:"capitalize" }}>{m.dir}</div>
                  </div>
                </div>
              </div>
            );
          })}
          <div style={{ fontSize:12, color:"#9a9189", fontStyle:"italic", marginTop:10, lineHeight:1.5 }}>
            Based on {recentEntries.length} recent vs {priorEntries.length} prior days. Differences below 0.3 are treated as stable noise.
          </div>
        </Card>
      )}

      <Card title="Daily Averages" emoji="🌡️">
        <div style={{ display:"flex", gap:10 }}>
          <SB label="Pain"    value={fmt(avge(logs.map(l=>l.overallPain)))} sub="overall" color={pf(3)} bg={pb(3)}
            delta={deltaPain} deltaInverted/>
          <SB label="Fatigue" value={fmt(fatigueAvg)} sub="0–5" color="#6A4C93" bg="#EFE6F5"
            delta={deltaFatigue} deltaInverted/>
          <SB label="Skin"    value={fmt(skinAvg)}    sub="flare" color="#B85C38" bg="#FFF0E8"
            delta={deltaSkin} deltaInverted/>
        </div>
        {trendDataReliable && (
          <div style={{ fontSize:11, color:"#9a9189", marginTop:10, fontStyle:"italic", textAlign:"center" }}>
            Comparing last 28 days vs the 28 days before that
          </div>
        )}
      </Card>

      {morningLogged >= 3 && (
        <Card title="Morning Soreness" emoji="🌅">
          <div style={{ display:"flex", gap:10, marginBottom:12 }}>
            {[1,2,3].map(v => (
              <SB key={v}
                label={MORNING_LBLS[v]}
                value={morningCounts[v]}
                sub={`${Math.round(morningCounts[v]/morningLogged*100)}% of days`}
                color={MORNING_FG[v]} bg={MORNING_BG[v]}/>
            ))}
          </div>
          {deltaStiffPct !== null && (
            <div style={{ padding:"10px 12px", marginBottom:10, borderRadius:9,
              background: Math.abs(deltaStiffPct) < 5 ? "#F5F0EB"
                        : deltaStiffPct < 0 ? "#E8F5E9" : "#FFEBEE",
              fontSize:13, color:"#1e3d2f", lineHeight:1.5 }}>
              {Math.abs(deltaStiffPct) < 5
                ? <>→ Stiff-or-worse mornings are <strong>broadly stable</strong> vs the prior 28 days ({Math.round(stiffPctRecent)}% now, {Math.round(stiffPctPrior)}% prior).</>
                : deltaStiffPct < 0
                ? <>↓ Stiff-or-worse mornings are <strong>down {Math.abs(deltaStiffPct)} points</strong> ({Math.round(stiffPctRecent)}% now vs {Math.round(stiffPctPrior)}% prior). Improving.</>
                : <>↑ Stiff-or-worse mornings are <strong>up {deltaStiffPct} points</strong> ({Math.round(stiffPctRecent)}% now vs {Math.round(stiffPctPrior)}% prior). Worth flagging.</>}
            </div>
          )}
          <div style={{ fontSize:12, color:"#9a9189", fontStyle:"italic" }}>
            Rheumatologists ask about morning stiffness at every appointment — these numbers are useful to share.
          </div>
        </Card>
      )}

      {painOnSkin!==null && painOffSkin!==null && skinFlareDays.length>=2 && (
        <Card title="Skin & Joint Connection" emoji="✨">
          <div style={{ display:"flex", gap:10, marginBottom:12 }}>
            <SB label="On skin flare days"  value={fmt(painOnSkin)}  sub={`${skinFlareDays.length} days`} color="#B85C38" bg="#FFF0E8"/>
            <SB label="On clear-skin days"  value={fmt(painOffSkin)} sub={`${noSkinFlareDays.length} days`} color="#2C5F4A" bg="#E8F5E9"/>
          </div>
          {painOnSkin > painOffSkin + 0.3 && (
            <div style={{ padding:12, marginBottom: deltaSkinJoint !== null ? 10 : 0,
              background:"#FFF0E8", borderRadius:9, fontSize:13, color:"#1e3d2f", lineHeight:1.6 }}>
              💡 Joint pain runs {(painOnSkin-painOffSkin).toFixed(1)} points higher when skin is flaring — they appear linked.
            </div>
          )}
          {deltaSkinJoint !== null && (
            <div style={{ padding:"10px 12px", borderRadius:9,
              background: Math.abs(deltaSkinJoint) < 0.3 ? "#F5F0EB"
                        : deltaSkinJoint < 0 ? "#E8F5E9" : "#FFEBEE",
              fontSize:13, color:"#1e3d2f", lineHeight:1.5 }}>
              {Math.abs(deltaSkinJoint) < 0.3
                ? <>→ The connection strength is <strong>broadly stable</strong> vs the prior 28 days (gap was {skinJointDiffPrior>0?"+":""}{skinJointDiffPrior.toFixed(1)} then).</>
                : deltaSkinJoint < 0
                ? <>↓ The skin–joint link has <strong>weakened by {Math.abs(deltaSkinJoint)} points</strong> vs the prior 28 days. Connection less pronounced.</>
                : <>↑ The skin–joint link has <strong>strengthened by {deltaSkinJoint} points</strong> vs the prior 28 days. Connection more pronounced.</>}
            </div>
          )}
        </Card>
      )}

      {topJoints.length>0 && (
        <Card title="Most Affected Joints" emoji="🦴">
          {topJoints.map(j=>(
            <div key={j.id} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
              <span style={{ fontSize:12, flex:1, color:"#1e3d2f", fontWeight:500 }}>{j.label}</span>
              <div style={{ flex:2, height:8, background:"#F0E8E0", borderRadius:4, overflow:"hidden" }}>
                <div style={{ width:`${(j.avg/5)*100}%`, height:"100%",
                  background:"linear-gradient(to right,#81C784,#EF5350)", borderRadius:4 }}/>
              </div>
              <span style={{ fontSize:13, fontWeight:800, color:pf(Math.round(j.avg)), width:26, textAlign:"right" }}>{j.avg.toFixed(1)}</span>
            </div>
          ))}
        </Card>
      )}

      {exAvg!==null&&noExAvg!==null&&(
        <Card title="Exercise Impact" emoji="🏃">
          <div style={{ display:"flex", gap:10, marginBottom:12 }}>
            <SB label="With exercise"    value={fmt(exAvg)}   sub={`${exDays.length} days`}   color="#2C5F4A" bg="#E8F5E9"/>
            <SB label="Without exercise" value={fmt(noExAvg)} sub={`${noExDays.length} days`} color="#E65100" bg="#FFF3E0"/>
          </div>
          <div style={{ padding:12, background:"#F5F0EB", borderRadius:9, fontSize:13, color:"#1e3d2f", lineHeight:1.6 }}>
            {exAvg<noExAvg ? `💡 Pain averages ${(noExAvg-exAvg).toFixed(1)} points lower on exercise days. Movement seems to help!`
              : exAvg>noExAvg ? `⚠️ Pain is slightly higher on exercise days — could be post-activity soreness. Worth mentioning to your rheumatologist.`
              : `➡️ No significant difference yet between exercise and rest days.`}
          </div>
        </Card>
      )}

      {alcAvg!==null&&noAlcAvg!==null&&alcDays.length>=2&&(
        <Card title="Alcohol Impact" emoji="🍷">
          <div style={{ display:"flex", gap:10, marginBottom: alcLag ? 12 : 0 }}>
            <SB label="Alcohol days" value={fmt(alcAvg)}   sub={`${alcDays.length} days`}
              color={alcAvg>noAlcAvg?"#C62828":"#2C5F4A"} bg={alcAvg>noAlcAvg?"#FFEBEE":"#E8F5E9"}/>
            <SB label="No alcohol"   value={fmt(noAlcAvg)} sub={`${noAlcDays.length} days`} color="#2C5F4A" bg="#E8F5E9"/>
          </div>
          {alcLag && Math.abs(alcLag.diff) >= 0.3 && (
            <div style={{ padding:12, background: alcLag.diff>0 ? "#FFEBEE" : "#E8F5E9",
              borderRadius:9, fontSize:13, color:"#1e3d2f", lineHeight:1.6 }}>
              {alcLag.diff > 0 ? "⚠️" : "💡"} Strongest effect: pain runs <strong>{alcLag.diff>0?"+":""}{alcLag.diff}</strong> points {lagLabel(alcLag.lag)} after drinking.
            </div>
          )}
        </Card>
      )}

      {sleepBins.length>=2&&(
        <Card title="Sleep & Pain" emoji="😴">
          <div style={{ display:"flex", gap:10 }}>
            {sleepBins.map(b=><SB key={b.label} label={b.label} value={fmt(b.avg)} sub={`${b.n} nights`} color="#2C5F4A" bg="#E8F5E9"/>)}
          </div>
        </Card>
      )}

      {foodInsights.length>0&&(
        <Card title="Food Correlations" emoji="🍽️">
          <p style={{ fontSize:12, color:"#9a9189", margin:"0 0 12px", lineHeight:1.6 }}>
            Each food is checked for effects on pain <strong>same-day, next-day, and 2 days later</strong> — the strongest signal is shown. Positive = higher pain, negative = lower.
          </p>
          {foodInsights.slice(0,8).map(f=>(
            <div key={f.id} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
              <span style={{ fontSize:13, width:22, textAlign:"center" }}>{f.emoji}</span>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:12, color:"#1e3d2f" }}>{f.label}</div>
                <div style={{ fontSize:10, color:"#9a9189", marginTop:1 }}>
                  {lagLabel(f.lag)} · {f.nYes} day{f.nYes===1?"":"s"}
                </div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <div style={{ width:60, height:6, background:"#F0E8E0", borderRadius:3, overflow:"hidden" }}>
                  <div style={{ width:`${Math.min(100,Math.abs(f.diff)/2*100)}%`, height:"100%",
                    background:f.diff>0?"#EF5350":"#4CAF50", borderRadius:3 }}/>
                </div>
                <span style={{ fontSize:13, fontWeight:700, minWidth:36, textAlign:"right",
                  color:f.diff>0.2?"#C62828":f.diff<-0.2?"#2C5F4A":"#9a9189" }}>
                  {f.diff>0?"+":""}{f.diff}
                </span>
              </div>
            </div>
          ))}
          <div style={{ fontSize:12, color:"#9a9189", fontStyle:"italic", marginTop:8, lineHeight:1.5 }}>
            Based on {n} entries. Foods with fewer than 3 days of data either way are hidden. Aim for 4+ weeks of consistent logging for reliable patterns.
          </div>
        </Card>
      )}

      <Card style={{ background:"#F5F0EB", border:"none" }}>
        <div style={{ fontFamily:"'Lora',serif", fontWeight:700, color:"#1e3d2f", marginBottom:6 }}>📋 Share with your doctor</div>
        <div style={{ fontSize:13, color:"#7a7069", lineHeight:1.7 }}>
          These are statistical patterns, not medical advice. Share them with your rheumatologist — they can help interpret what the data means for your specific situation.
        </div>
      </Card>
    </div>
  );
}

// ─── App Root ─────────────────────────────────────────────────────────────────

function PsATracker() {
  const [tab,     setTab]     = useState("log");
  const [log,     setLog]     = useState(emptyLog());
  const [logs,    setLogs]    = useState([]);
  const [saveMsg, setSaveMsg] = useState("");

  useEffect(() => {
    const stored = readLogs();
    if (stored.length) {
      setLogs(stored);
      const todayEntry = stored.find(l => l.date === todayStr());
      if (todayEntry) setLog(todayEntry);
    }
  }, []);

  const onSave = () => {
    const entry   = { ...log };   // log.date may be today or a past date being edited
    const updated = [...logs.filter(l => l.date !== entry.date), entry]
                      .sort((a,b) => a.date.localeCompare(b.date));
    writeLogs(updated);
    setLogs(updated);
    setSaveMsg("Saved ✓");
    setTimeout(() => setSaveMsg(""), 2500);
  };

  const onEditEntry = (date) => {
    const entry = logs.find(l => l.date === date);
    if (!entry) return;
    // Merge with emptyLog to ensure new fields exist on old entries
    setLog({ ...emptyLog(), ...entry });
    setTab("log");
    window.scrollTo({ top:0, behavior:"smooth" });
  };

  const onAddMissedDay = (date) => {
    if (!date) return;
    if (date > todayStr()) { alert("You can't add an entry for a date in the future."); return; }
    const existing = logs.find(l => l.date === date);
    if (existing) {
      // Date already has an entry — just open it for editing
      onEditEntry(date);
      return;
    }
    setLog({ ...emptyLog(), date });
    setTab("log");
    window.scrollTo({ top:0, behavior:"smooth" });
  };

  const onDeleteEntry = (date) => {
    if (!confirm(`Delete the entry for ${new Date(date+"T12:00:00").toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"})}? This can't be undone.`)) return;
    const updated = logs.filter(l => l.date !== date);
    writeLogs(updated);
    setLogs(updated);
    // If we were editing the deleted entry, reset the form
    if (log.date === date) setLog(emptyLog());
  };

  const onResetToToday = () => {
    const todayEntry = logs.find(l => l.date === todayStr());
    setLog(todayEntry ? { ...emptyLog(), ...todayEntry } : emptyLog());
  };

  const onLoadDemo = () => {
    const proceed = logs.length === 0
      ? confirm("Load 60 days of demo data? This shows what insights look like with a full dataset. You can wipe it any time.")
      : confirm(`You already have ${logs.length} entries. Loading demo data will MERGE 60 days of fake entries with your real data — some real entries may be overwritten by demo ones on the same dates.\n\nWe strongly recommend exporting a backup first.\n\nContinue?`);
    if (!proceed) return;
    const demo = generateDemoData();
    const merged = Object.values(
      [...logs, ...demo].reduce((acc,l) => ({ ...acc, [l.date]:l }), {})
    ).sort((a,b) => a.date.localeCompare(b.date));
    writeLogs(merged);
    setLogs(merged);
    setLog(emptyLog());
    alert(`Loaded ${demo.length} days of demo data. Open the Insights tab to see the full picture!`);
  };

  const onWipeAll = () => {
    if (!confirm(`⚠️ This will permanently delete ALL ${logs.length} entries. This cannot be undone.\n\nWe strongly recommend exporting a backup first.\n\nAre you sure?`)) return;
    if (!confirm("Really wipe everything? Last chance to cancel.")) return;
    writeLogs([]);
    setLogs([]);
    setLog(emptyLog());
    setTab("log");
  };

  const onExport = () => {
    const blob = new Blob([JSON.stringify(logs, null, 2)], { type:"application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = `psa-journal-${todayStr()}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  const onImport = file => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const imported = JSON.parse(e.target.result);
        if (!Array.isArray(imported)) throw new Error();
        const merged = Object.values(
          [...logs, ...imported].reduce((acc,l) => ({ ...acc, [l.date]:l }), {})
        ).sort((a,b) => a.date.localeCompare(b.date));
        writeLogs(merged);
        setLogs(merged);
        const todayEntry = merged.find(l => l.date === todayStr());
        if (todayEntry) setLog(todayEntry);
        alert(`Imported ${imported.length} entries.`);
      } catch { alert("Could not read file. Please use a valid PsA Journal backup."); }
    };
    reader.readAsText(file);
  };

  return (
    <div style={{ maxWidth:480, margin:"0 auto", minHeight:"100vh", background:"#FAF7F2" }}>
      <header style={{ background:"linear-gradient(135deg,#1e3d2f 0%,#2C5F4A 100%)",
        padding:"22px 20px 18px", display:"flex", justifyContent:"space-between", alignItems:"flex-end" }}>
        <div>
          <div style={{ fontFamily:"'Lora',serif", fontSize:26, fontWeight:800, color:"#fff", letterSpacing:.3, lineHeight:1 }}>PsA Journal</div>
          <div style={{ fontSize:12, color:"rgba(255,255,255,.65)", marginTop:4, letterSpacing:.4 }}>Psoriatic Arthritis Tracker</div>
        </div>
        <div style={{ textAlign:"right" }}>
          <div style={{ fontSize:13, color:"rgba(255,255,255,.85)" }}>
            {new Date().toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short",year:"numeric"})}
          </div>
          <div style={{ fontSize:11, color:"rgba(255,255,255,.5)", marginTop:2 }}>
            {logs.length} entr{logs.length===1?"y":"ies"} logged
          </div>
        </div>
      </header>

      <nav style={{ display:"flex", background:"#fff", borderBottom:"1px solid #ECE5DC",
        position:"sticky", top:0, zIndex:100, boxShadow:"0 2px 8px rgba(0,0,0,.06)" }}>
        {[["log","📋 Today"],["history","📅 History"],["insights","📊 Insights"]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{
            flex:1, padding:"12px 4px", border:"none",
            borderBottom:`2.5px solid ${tab===id?"#2C5F4A":"transparent"}`,
            background:"#fff", cursor:"pointer", fontSize:13,
            fontWeight:tab===id?600:400,
            color:tab===id?"#2C5F4A":"#9a9189", transition:"all .15s",
          }}>{label}</button>
        ))}
      </nav>

      <main style={{ padding:"16px 16px 0" }}>
        {tab==="log"      && <LogTab      log={log} setLog={setLog} onSave={onSave} saveMsg={saveMsg} onResetToToday={onResetToToday} logs={logs}/>}
        {tab==="history"  && <HistoryTab  logs={logs} onExport={onExport} onImport={onImport} onEditEntry={onEditEntry} onDeleteEntry={onDeleteEntry} onAddMissedDay={onAddMissedDay} onLoadDemo={onLoadDemo} onWipeAll={onWipeAll}/>}
        {tab==="insights" && <InsightsTab logs={logs} onEditEntry={onEditEntry} onAddMissedDay={onAddMissedDay}/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PsATracker />);
</script>
</body>
</html>
