const ALL_FOODS = [...TRIGGERS, ...POSITIVES];

const WEATHER_OPTS  = ["☀️ Sunny","⛅ Cloudy","🌧️ Rainy","🌬️ Windy","❄️ Cold","💧 Humid","🌡️ Hot"];

const MORNING_LBLS = ["–","Fine","Stiff","Very Sore"];
const MORNING_BG   = ["#F0E8E0","#E8F5E9","#FFE0B2","#FFCDD2"];
const MORNING_FG   = ["#9a9189","#388E3C","#EF6C00","#B71C1C"];

const PAIN_BG   = ["#E8F5E9","#C8E6C9","#FFF9C4","#FFE0B2","#FFCCBC","#FFCDD2"];
const PAIN_FG   = ["#388E3C","#2E7D32","#F9A825","#EF6C00","#BF360C","#B71C1C"];
const PAIN_LBLS = ["None","Very Mild","Mild","Moderate","Severe","Very Severe"];
const pb = v => PAIN_BG[v]   ?? PAIN_BG[0];
const pf = v => PAIN_FG[v]   ?? PAIN_FG[0];
const pl = v => PAIN_LBLS[v] ?? "";

const todayStr = () => new Date().toISOString().split("T")[0];

const emptyLog = () => ({
  date:todayStr(), overallPain:0, joints:{}, swelling:{},
  foods:[], exercise:"None", exerciseMins:0,
  alcohol:0, stress:0, sleep:7, weather:[], notes:"",
  skinFlare:0,
  fatigue:0,
  morning:0,
});

// ─── Storage: localStorage with in-memory fallback ────────────────────────────

const SKEY = "psa-tracker-v1";
let _cache = [];

function readLogs() {
  try {
    const raw = localStorage.getItem(SKEY);
    if (raw) { _cache = JSON.parse(raw); return _cache; }
  } catch (_) {}
  return _cache;
}

function writeLogs(logs) {
  _cache = logs;
  try { localStorage.setItem(SKEY, JSON.stringify(logs)); } catch (_) {}
  return true;
}

// ─── Demo data generator ─────────────────────────────────────────────────────
// Creates 60 days of synthetic but realistic PsA data with built-in causal
// patterns the insights engine can detect:
//   - Dairy raises pain ~1.0 points 2 days later  (lag analysis)
//   - Alcohol raises pain ~0.7 points the next day (lag analysis)
//   - Sleep <6h raises pain ~0.5 points next day  (sleep correlation)
//   - Exercise lowers pain ~0.4 points same day   (exercise correlation)
//   - Skin and joint flares loosely co-occur      (skin-joint connection)
//   - Two distinct flare clusters near start of period (Trend Direction shows improvement)
//   - Right knee, left fingers, lower back are her chronic problem joints

function generateDemoData() {
  const days = 60;
  const today = new Date(todayStr()+"T12:00:00");
  const entries = [];

  // Random helper with seedable feel
  const rand = () => Math.random();
  const pick = (arr, p=0.5) => rand() < p ? arr : null;
  const clamp = (v, lo=0, hi=5) => Math.max(lo, Math.min(hi, v));
  const round = v => Math.round(v);

  // First, create base entries
  for (let i = days-1; i >= 0; i--) {
    const date = new Date(today);
    date.setDate(date.getDate() - i);
    const dateStr = date.toISOString().split("T")[0];
    const dayIndex = days - 1 - i;  // 0 = oldest, 59 = today

    // Base pain level — flare clusters early in period for trend improvement
    let basePain = 1.5 + rand()*0.8;  // baseline 1.5-2.3
    if (dayIndex >= 5 && dayIndex <= 9)   basePain += 1.8;   // early flare cluster
    if (dayIndex >= 18 && dayIndex <= 21) basePain += 1.5;   // second flare cluster
    if (dayIndex >= 45) basePain -= 0.4;                      // gradually improving

    // Decide foods, alcohol, exercise, sleep first — they'll feed into pain
    const ateDairy   = rand() < 0.45;
    const ateGluten  = rand() < 0.5;
    const ateProcessed = rand() < 0.3;
    const ateFried   = rand() < 0.2;
    const ateSugar   = rand() < 0.4;
    const ateOilyFish = rand() < 0.25;
    const ateVeg     = rand() < 0.7;
    const ateOliveOil = rand() < 0.5;
    const ateBerries = rand() < 0.3;

    const dayOfWeek = date.getDay(); // 0=Sun, 6=Sat
    const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
    const alcohol = isWeekend && rand() < 0.6 ? 1 + Math.floor(rand()*3) : (rand() < 0.15 ? 1 : 0);

    const exerciseRoll = rand();
    const exercise = exerciseRoll < 0.5 ? "None"
      : exerciseRoll < 0.7 ? "Walking"
      : exerciseRoll < 0.85 ? "Yoga / Stretching"
      : exerciseRoll < 0.95 ? "Swimming" : "Cycling";
    const exerciseMins = exercise === "None" ? 0 : 15 + Math.floor(rand()*4)*15;

    const sleep = round((6.5 + (rand()-0.5)*3.5) * 2) / 2;  // 4.5-9 in 0.5 steps

    const foods = [];
    if (ateDairy)     foods.push("dairy");
    if (ateGluten)    foods.push("gluten");
    if (ateProcessed) foods.push("processed");
    if (ateFried)     foods.push("fried");
    if (ateSugar)     foods.push("sugar");
    if (rand() < 0.2) foods.push("red-meat");
    if (rand() < 0.15) foods.push("eggs");
    if (ateOilyFish)  foods.push("oily-fish");
    if (ateVeg)       foods.push("vegetables");
    if (ateOliveOil)  foods.push("olive-oil");
    if (ateBerries)   foods.push("berries");
    if (rand() < 0.2) foods.push("nuts");
    if (rand() < 0.1) foods.push("turmeric");
    if (rand() < 0.15) foods.push("fermented");

    entries.push({
      _ateDairy: ateDairy,
      _alcohol: alcohol,
      _sleep: sleep,
      _exercise: exercise !== "None",
      basePain,
      date: dateStr,
      foods,
      exercise,
      exerciseMins,
      alcohol,
      sleep,
    });
  }

  // Apply lag effects: pain depends on yesterday's alcohol/sleep and 2-days-ago dairy
  return entries.map((e, i) => {
    let pain = e.basePain;
    if (i >= 1) {
      const yesterday = entries[i-1];
      if (yesterday._alcohol > 0) pain += 0.7 + rand()*0.4;
      if (yesterday._sleep < 6)   pain += 0.5 + rand()*0.3;
    }
    if (i >= 2) {
      const twoDaysAgo = entries[i-2];
      if (twoDaysAgo._ateDairy) pain += 0.9 + rand()*0.4;
    }
    if (e._exercise) pain -= 0.4 + rand()*0.2;
    pain += (rand()-0.5)*0.6;  // small noise
    const overallPain = clamp(round(pain));

    // Joint pain — chronic problem joints, others occasional
    const joints = {};
    const swelling = {};
    const chronic = ["knee_r","fingers_l","lower_back"];
    chronic.forEach(jid => {
      const jp = clamp(round(overallPain - 0.3 + (rand()-0.5)*1.5));
      if (jp > 0) joints[jid] = jp;
      if (jp >= 3 && rand() < 0.4) swelling[jid] = true;
    });
    if (overallPain >= 3) {
      // On bad days, more joints affected
      const extras = ["wrist_r","fingers_r","ankle_l","neck"];
      extras.forEach(jid => {
        if (rand() < 0.5) {
          const jp = clamp(round(overallPain - 1 + (rand()-0.5)*1.2));
          if (jp > 0) joints[jid] = jp;
        }
      });
    }

    // Morning soreness: roughly tracks pain
    const morning = overallPain >= 4 ? (rand() < 0.7 ? 3 : 2)
                  : overallPain >= 2 ? (rand() < 0.6 ? 2 : 1)
                  : (rand() < 0.7 ? 1 : 2);

    // Fatigue tracks pain with noise
    const fatigue = clamp(round(overallPain - 0.3 + (rand()-0.5)*1.4));

    // Skin flare — partially correlated with joint flare, slower-moving
    let skinBase = 1.2 + (i / days) * 0.5; // gradually trending up
    if (overallPain >= 3 && rand() < 0.6) skinBase += 1;
    if (i >= 10 && i <= 14) skinBase += 1.5; // dedicated skin flare period
    const skinFlare = clamp(round(skinBase + (rand()-0.5)*1.2));

    // Stress — mild correlation with pain
    const stress = clamp(round(2 + (overallPain-2)*0.4 + (rand()-0.5)*1.5));

    // Weather — random selection
    const weatherOpts = ["☀️ Sunny","⛅ Cloudy","🌧️ Rainy","🌬️ Windy","❄️ Cold","💧 Humid","🌡️ Hot"];
    const weather = [];
    weather.push(weatherOpts[Math.floor(rand()*weatherOpts.length)]);
    if (rand() < 0.3) weather.push(weatherOpts[Math.floor(rand()*weatherOpts.length)]);

    // Notes on a few days
    let notes = "";
    if (overallPain >= 4 && rand() < 0.5) {
      const flareNotes = ["Tough day. Difficult getting out of bed.","Struggled to grip mug at breakfast.","Cancelled plans, needed to rest.","Pain worse than usual — could barely walk by evening.","Took extra anti-inflammatories."];
      notes = flareNotes[Math.floor(rand()*flareNotes.length)];
    } else if (overallPain <= 1 && rand() < 0.3) {
      const goodNotes = ["Good day overall, felt almost normal.","Energy levels much better today.","Joints felt looser than usual."];
      notes = goodNotes[Math.floor(rand()*goodNotes.length)];
    }

    return {
      date: e.date,
      overallPain,
      joints,
      swelling,
      foods: e.foods,
      exercise: e.exercise,
      exerciseMins: e.exerciseMins,
      alcohol: e.alcohol,
      stress,
      sleep: e.sleep,
      weather,
      notes,
      skinFlare,
      fatigue,
      morning,
    };
  });
}

// ─── Small components ─────────────────────────────────────────────────────────

function Card({ title, emoji, children, style }) {

    <div style={{ background:"#fff", borderRadius:16, padding:"18px 20px", marginBottom:14,
      border:"1px solid #ECE5DC", boxShadow:"0 2px 14px rgba(44,95,74,.06)", ...style }}>

}

function Chip({ label, active, onClick, color="#2C5F4A" }) {
  return (
    <button onClick={onClick} style={{
      padding:"6px 14px", borderRadius:20,
      border:`1.5px solid ${active ? color : "#E2D9CE"}`,
      background: active ? color : "#fff",
      color: active ? "#fff" : "#7a7069",
      cursor:"pointer", fontSize:13,
      fontWeight: active ? 500 : 400, transition:"all .15s", whiteSpace:"nowrap",
    }}>{label}</button>

}

function Stepper({ value, onChange, min=0, step=1, suffix="" }) {
  return (
    <div style={{ display:"flex", alignItems:"center", gap:10,
      background:"#F7F2EC", borderRadius:10, padding:"5px 14px", width:"fit-content" }}>
      <button onClick={() => onChange(Math.max(min, value - step))}
        style={{ width:30, height:30, borderRadius:7, border:"1px solid #E2D9CE",
          background:"#fff", cursor:"pointer", fontSize:18, fontWeight:700, color:"#2C5F4A", lineHeight:1 }}>−</button>
      <span style={{ minWidth:40, textAlign:"center", fontFamily:"'Lora',serif",
        fontWeight:700, fontSize:16, color:"#1e3d2f" }}>{value}{suffix}</span>
      <button onClick={() => onChange(value + step)}
        style={{ width:30, height:30, borderRadius:7, border:"1px solid #E2D9CE",
          background:"#fff", cursor:"pointer", fontSize:18, fontWeight:700, color:"#2C5F4A", lineHeight:1 }}>+</button>
    </div>
  );
}

function ScaleDots({ value, onChange }) {
  return (
    <div style={{ display:"flex", gap:6 }}>
      {[0,1,2,3,4,5].map(v => (
        <button key={v} onClick={() => onChange(v)} style={{
          width:36, height:36, borderRadius:9,
          border:`2px solid ${value===v ? pf(v) : "#E2D9CE"}`,
          background: value===v ? pb(v) : "#faf7f3",
          cursor:"pointer", fontWeight:700, fontSize:14,
          color: value===v ? pf(v) : "#b0a99f", transition:"all .12s",
        }}>{v}</button>
      ))}
    </div>
  );
}

// Simple SVG line chart (no external dependencies) ────────────────────────────
function SimpleLineChart({ data }) {
  if (!data.length) return null;
  const w = 320, h = 160, padL = 24, padR = 6, padT = 8, padB = 28;
  const maxX = Math.max(data.length - 1, 1);
  const xScale = i => padL + (i / maxX) * (w - padL - padR);
  const yScale = v => h - padB - (v / 5) * (h - padT - padB);
  const points = data.map((d, i) => `${xScale(i)},${yScale(d.pain)}`).join(" ");
  const showEvery = Math.max(1, Math.ceil(data.length / 7));

  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width:"100%", height:160, overflow:"visible" }}>
      {[0,1,2,3,4,5].map(y => (
        <g key={y}>
          <line x1={padL} y1={yScale(y)} x2={w-padR} y2={yScale(y)}
            stroke="#F0E8E0" strokeDasharray="3 3" />
          <text x={padL-4} y={yScale(y)+3} fontSize="9" fill="#9a9189" textAnchor="end">{y}</text>
        </g>
      ))}
      {data.map((d,i) => i % showEvery === 0 ? (
        <text key={i} x={xScale(i)} y={h-10} fontSize="9" fill="#9a9189" textAnchor="middle">{d.date}</text>
      ) : null)}
      <polyline points={points} fill="none" stroke="#2C5F4A" strokeWidth="2.5"
        strokeLinecap="round" strokeLinejoin="round" />
      {data.map((d,i) => (
        <circle key={i} cx={xScale(i)} cy={yScale(d.pain)} r="3.5" fill="#2C5F4A" />
      ))}
    </svg>
  );
}

// ─── Stock-style Pain Trend Chart with range toggle ───────────────────────────
function PainTrendChart({ logs }) {
  const [range, setRange] = useState("1M");
  const RANGES = [
    { id:"1M", label:"1M", days:30 },
    { id:"3M", label:"3M", days:90 },
    { id:"6M", label:"6M", days:180 },
    { id:"ALL", label:"All", days:Infinity },
  ];

  const days = RANGES.find(r => r.id === range).days;

  // Filter to range
  const today = new Date(todayStr()+"T12:00:00");
  const cutoff = new Date(today);
  if (Number.isFinite(days)) cutoff.setDate(cutoff.getDate() - days + 1);
  else cutoff.setFullYear(1970);
  const cutoffStr = cutoff.toISOString().split("T")[0];

  const filtered = logs
    .filter(l => l.date >= cutoffStr)
    .sort((a,b) => a.date.localeCompare(b.date));

  if (filtered.length < 2) {
    return (
      <div>
        <RangeToggle range={range} setRange={setRange} ranges={RANGES}/>
        <div style={{ padding:"40px 0", textAlign:"center", color:"#9a9189", fontSize:13 }}>
          Not enough data in this period yet.
        </div>
      </div>
    );
  }

  // ─── Calculate change metrics (stock-style) ──────────────────────────────────
  // Compare the first and last "fair share" of the period rather than just first/last
  // single days, because a single day can be an outlier.
  const windowSize = Math.max(3, Math.ceil(filtered.length / 7));
  const startWindow = filtered.slice(0, windowSize).map(l => l.overallPain);
  const endWindow   = filtered.slice(-windowSize).map(l => l.overallPain);
  const avg = arr => arr.reduce((s,x)=>s+x,0) / arr.length;
  const startAvg = avg(startWindow);
  const endAvg   = avg(endWindow);
  const absChange = endAvg - startAvg;
  // % change relative to start; guard against /0 by using a +0.5 floor
  const pctChange = startAvg < 0.5
    ? (endAvg - startAvg) * 100   // when start is near 0, just show absolute*100 as a sensible proxy
    : ((endAvg - startAvg) / startAvg) * 100;
  const isImproving = absChange < -0.1;
  const isWorsening = absChange > 0.1;
  const trendColor = isImproving ? "#2C5F4A" : isWorsening ? "#C62828" : "#9a9189";
  const arrow = isImproving ? "▼" : isWorsening ? "▲" : "→";

  // ─── Chart geometry ──────────────────────────────────────────────────────────
  const w = 340, h = 180, padL = 26, padR = 8, padT = 12, padB = 28;
  const maxX = Math.max(filtered.length - 1, 1);
  const xScale = i => padL + (i / maxX) * (w - padL - padR);
  const yScale = v => h - padB - (v / 5) * (h - padT - padB);

  // Smooth area fill points
  const linePoints = filtered.map((d, i) => `${xScale(i)},${yScale(d.overallPain)}`).join(" ");
  const areaPoints = `${padL},${yScale(0)} ${linePoints} ${xScale(filtered.length-1)},${yScale(0)}`;

  // X-axis date ticks: show 4-6 evenly spaced labels
  const tickCount = filtered.length > 60 ? 5 : filtered.length > 14 ? 4 : 3;
  const tickStep = Math.max(1, Math.floor((filtered.length-1) / (tickCount-1)));
  const ticks = [];
  for (let i = 0; i < filtered.length; i += tickStep) ticks.push(i);
  if (ticks[ticks.length-1] !== filtered.length-1) ticks.push(filtered.length-1);

  const fmtTickDate = ds => {
    const d = new Date(ds+"T12:00:00");
    return d.toLocaleDateString("en-GB",{ day:"numeric", month:"short" });
  };

  // Trend reference line: from start avg to end avg, shown as a thin dashed line
  const trendY1 = yScale(startAvg);
  const trendY2 = yScale(endAvg);

  return (
    <div>
      {/* Headline change number — the "stock ticker" feel */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:14 }}>
        <div>
          <div style={{ fontFamily:"'Lora',serif", fontSize:32, fontWeight:800, color:"#1e3d2f", lineHeight:1 }}>
            {endAvg.toFixed(1)}<span style={{ fontSize:14, fontWeight:400, color:"#9a9189", marginLeft:4 }}>/5</span>
          </div>
          <div style={{ fontSize:11, color:"#9a9189", marginTop:4 }}>
            Recent average · {filtered.length} day{filtered.length===1?"":"s"} logged
          </div>
        </div>
        <div style={{ textAlign:"right" }}>
          <div style={{ fontFamily:"'Lora',serif", fontSize:18, fontWeight:700, color:trendColor, lineHeight:1 }}>
            {arrow} {Math.abs(pctChange) < 1 ? "<1" : Math.abs(pctChange).toFixed(0)}%
          </div>
          <div style={{ fontSize:11, color:trendColor, marginTop:4, fontWeight:600 }}>
            {absChange > 0 ? "+" : ""}{absChange.toFixed(1)} pts vs period start
          </div>
        </div>
      </div>

      {/* Range toggle */}
      <RangeToggle range={range} setRange={setRange} ranges={RANGES}/>

      {/* Chart */}
      <svg viewBox={`0 0 ${w} ${h}`} style={{ width:"100%", height:180, overflow:"visible", marginTop:12 }}>
        <defs>
          <linearGradient id="painArea" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stopColor={trendColor} stopOpacity="0.18"/>
            <stop offset="100%" stopColor={trendColor} stopOpacity="0"/>
          </linearGradient>
        </defs>

        {/* Y grid */}
        {[0,1,2,3,4,5].map(y => (
          <g key={y}>
            <line x1={padL} y1={yScale(y)} x2={w-padR} y2={yScale(y)}
              stroke="#F0E8E0" strokeDasharray="3 3"/>
            <text x={padL-4} y={yScale(y)+3} fontSize="9" fill="#9a9189" textAnchor="end">{y}</text>
          </g>
        ))}

        {/* Area fill under line */}
        <polygon points={areaPoints} fill="url(#painArea)"/>

        {/* Trend reference line (start avg → end avg) */}
        <line x1={xScale(0)} y1={trendY1} x2={xScale(filtered.length-1)} y2={trendY2}
          stroke={trendColor} strokeWidth="1" strokeDasharray="4 3" opacity="0.5"/>

        {/* Pain line */}
        <polyline points={linePoints} fill="none" stroke={trendColor} strokeWidth="2"
          strokeLinecap="round" strokeLinejoin="round"/>

        {/* Dots — only on first, last, and any peaks */}
        {filtered.length <= 35 && filtered.map((d,i) => (
          <circle key={i} cx={xScale(i)} cy={yScale(d.overallPain)} r="2" fill={trendColor}/>
        ))}
        {/* Always mark first and last */}
        <circle cx={xScale(0)} cy={yScale(filtered[0].overallPain)} r="3.5"
          fill="#fff" stroke={trendColor} strokeWidth="2"/>
        <circle cx={xScale(filtered.length-1)} cy={yScale(filtered[filtered.length-1].overallPain)} r="3.5"
          fill={trendColor} stroke="#fff" strokeWidth="1.5"/>

        {/* X-axis labels */}
        {ticks.map((i,idx) => {
          const x = xScale(i);
          const align = idx === 0 ? "start" : idx === ticks.length-1 ? "end" : "middle";
          return (
            <text key={i} x={x} y={h-10} fontSize="9" fill="#9a9189" textAnchor={align}>
              {fmtTickDate(filtered[i].date)}
            </text>
          );
        })}
      </svg>

      <div style={{ fontSize:11, color:"#9a9189", textAlign:"center", marginTop:6, fontStyle:"italic" }}>
        Dashed line shows trend from {startAvg.toFixed(1)} → {endAvg.toFixed(1)}
      </div>
    </div>
  );
}

function RangeToggle({ range, setRange, ranges }) {
  return (
    <div style={{ display:"flex", gap:6 }}>
      {ranges.map(r => (
        <button key={r.id} onClick={() => setRange(r.id)} style={{
          flex:1, padding:"7px 0", borderRadius:8,
          border:`1.5px solid ${range===r.id ? "#2C5F4A" : "#E2D9CE"}`,
          background: range===r.id ? "#2C5F4A" : "#fff",
          color: range===r.id ? "#fff" : "#7a7069",
          cursor:"pointer", fontSize:12, fontWeight:600,
        }}>{r.label}</button>
      ))}
    </div>
  );
}

// ─── Doctor Report PDF Generator ──────────────────────────────────────────────

function generateDoctorReport(allLogs, { startDate, endDate, patientName }) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:"mm", format:"a4" });

  // A4 dimensions in mm
  const PAGE_W = 210, PAGE_H = 297;
  const MARGIN = 15;
  const CONTENT_W = PAGE_W - MARGIN*2;

  // Filter logs to date range and sort
  const logs = allLogs
    .filter(l => l.date >= startDate && l.date <= endDate)
    .sort((a,b) => a.date.localeCompare(b.date));

  // Helpers
  const avg = arr => arr.length ? arr.reduce((s,x)=>s+x,0)/arr.length : null;
  const fmtNum = v => v===null||v===undefined ? "—" : v.toFixed(1);
  const fmtDate = ds => new Date(ds+"T12:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
  const fmtDateShort = ds => new Date(ds+"T12:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short"});

  // Same colour scale as app, as RGB
  const PAIN_RGB = [[232,245,233],[200,230,201],[255,249,196],[255,224,178],[255,204,188],[255,205,210]];
  const PAIN_RGB_FG = [[56,142,60],[46,125,50],[249,168,37],[239,108,0],[191,54,12],[183,28,28]];

  // Track current Y on the page; new pages reset
  let y = MARGIN;

  const newPageIfNeeded = (needed) => {
    if (y + needed > PAGE_H - MARGIN) { doc.addPage(); y = MARGIN; addPageHeader(); }
  };
  const addPageHeader = () => {
    doc.setFont("helvetica","normal").setFontSize(8).setTextColor(150,150,150);
    doc.text(`PsA Journal | ${fmtDate(startDate)} - ${fmtDate(endDate)}`, MARGIN, 10);
    doc.text(`Page ${doc.internal.getNumberOfPages()}`, PAGE_W - MARGIN, 10, { align:"right" });
  };

  // ─── PAGE 1: Cover & Summary ────────────────────────────────────────────────
  addPageHeader();
  y = MARGIN + 5;

  // Title
  doc.setFont("helvetica","bold").setFontSize(20).setTextColor(30,61,47);
  doc.text("PsA Symptom Report", MARGIN, y);
  y += 8;
  doc.setFont("helvetica","normal").setFontSize(11).setTextColor(122,112,105);
  doc.text(`${fmtDate(startDate)} to ${fmtDate(endDate)}`, MARGIN, y);
  y += 6;
  if (patientName) {
    doc.setFontSize(10);
    doc.text(`Patient: ${patientName}`, MARGIN, y);
    y += 6;
  }
  doc.setFontSize(9).setTextColor(154,145,137);
  doc.text(`${logs.length} of ${Math.round((new Date(endDate)-new Date(startDate))/86400000)+1} days logged | Generated ${fmtDate(todayStr())}`, MARGIN, y);
  y += 10;

  // No data guard
  if (logs.length === 0) {
    doc.setFontSize(12).setTextColor(120,120,120);
    doc.text("No entries found in this date range.", MARGIN, y);
    return doc;
  }

  // ─── Calculate everything we need up-front so we can write a summary ────────
  const avgPain    = avg(logs.map(l=>l.overallPain||0));
  const avgFatigue = avg(logs.map(l=>l.fatigue||0));
  const avgSkin    = avg(logs.map(l=>l.skinFlare||0));
  const flareDays  = logs.filter(l => (l.overallPain||0) >= 3).length;
  const flareRate  = logs.length ? Math.round(flareDays/logs.length*100) : 0;
  const morningCounts = [0,0,0,0];
  logs.forEach(l => { if (l.morning>=1 && l.morning<=3) morningCounts[l.morning]++; });
  const morningLogged = morningCounts[1]+morningCounts[2]+morningCounts[3];
  const stiffOrWorsePct = morningLogged ? Math.round((morningCounts[2]+morningCounts[3])/morningLogged*100) : null;

  // Joint stats - calculated here so summary can reference top joints
  const jointTotals = {};
  const swellingCounts = {};
  logs.forEach(l => {
    Object.entries(l.joints||{}).forEach(([id,p]) => {
      if (!jointTotals[id]) jointTotals[id] = [];
      jointTotals[id].push(p);
    });
    Object.entries(l.swelling||{}).forEach(([id,s]) => {
      if (s) swellingCounts[id] = (swellingCounts[id]||0)+1;
    });
  });
  const topJoints = JOINTS
    .map(j => ({ ...j, avg: avg((jointTotals[j.id]||[]).filter(v=>v>0)),
                 days:(jointTotals[j.id]||[]).filter(v=>v>0).length,
                 swelling: swellingCounts[j.id]||0 }))
    .filter(j => j.avg !== null && j.avg > 0)
    .sort((a,b) => b.avg - a.avg)
    .slice(0, 8);

  // Trend within the report period itself
  const periodTrend = (() => {
    if (logs.length < 8) return null;
    const slice = Math.max(3, Math.ceil(logs.length / 4));
    const startAvg = avg(logs.slice(0, slice).map(l=>l.overallPain||0));
    const endAvg   = avg(logs.slice(-slice).map(l=>l.overallPain||0));
    return +(endAvg - startAvg).toFixed(1);
  })();

  // ─── Plain-language summary at the top ─────────────────────────────────────
  doc.setDrawColor(236,229,220).setLineWidth(0.3);
  doc.line(MARGIN, y, PAGE_W-MARGIN, y);
  y += 6;

  doc.setFont("helvetica","bold").setFontSize(13).setTextColor(30,61,47);
  doc.text("Summary", MARGIN, y);
  y += 7;

  // Build summary sentences
  const summaryLines = [];
  // Sentence 1: overall picture
  const painLevel = avgPain < 1.5 ? "low" : avgPain < 2.5 ? "mild to moderate" : avgPain < 3.5 ? "moderate" : "high";
  summaryLines.push(`Average pain across this period was ${avgPain.toFixed(1)}/5 (${painLevel}), with ${flareDays} flare day${flareDays===1?"":"s"} (pain at level 3 or above) representing ${flareRate}% of logged days.`);

  // Sentence 2: trend within period
  if (periodTrend !== null) {
    if (Math.abs(periodTrend) < 0.3) {
      summaryLines.push(`Symptoms were broadly stable across this period (no significant trend in either direction).`);
    } else if (periodTrend < 0) {
      summaryLines.push(`Symptoms improved across this period, with average pain trending down by ${Math.abs(periodTrend)} points from start to end.`);
    } else {
      summaryLines.push(`Symptoms worsened across this period, with average pain trending up by ${periodTrend} points from start to end.`);
    }
  }

  // Sentence 3: morning stiffness
  if (stiffOrWorsePct !== null && morningLogged >= 5) {
    summaryLines.push(`Morning stiffness was reported as 'Stiff' or 'Very Sore' on ${stiffOrWorsePct}% of mornings.`);
  }

  // Sentence 4: top joints
  if (topJoints.length > 0) {
    const topNames = topJoints.slice(0, 3).map(j => j.label).join(", ");
    summaryLines.push(`The most affected joints were ${topNames}.`);
  }

  // Sentence 5: comorbid skin
  if (avgSkin >= 1.5) {
    summaryLines.push(`Notable skin involvement was present (average severity ${avgSkin.toFixed(1)}/5).`);
  }

  // Sentence 6: fatigue
  if (avgFatigue >= 2.5) {
    summaryLines.push(`Fatigue was a significant feature throughout (average ${avgFatigue.toFixed(1)}/5).`);
  }

  doc.setFont("helvetica","normal").setFontSize(10).setTextColor(50,50,50);
  summaryLines.forEach(line => {
    const wrapped = doc.splitTextToSize(line, CONTENT_W);
    doc.text(wrapped, MARGIN, y);
    y += wrapped.length * 4.5 + 2;
  });
  y += 4;

  // ─── Headline numbers ──────────────────────────────────────────────────────
  doc.setDrawColor(236,229,220).line(MARGIN, y, PAGE_W-MARGIN, y);
  y += 6;

  doc.setFont("helvetica","bold").setFontSize(13).setTextColor(30,61,47);
  doc.text("Summary of Activity", MARGIN, y);
  y += 7;

  // 4-column grid of headline stats
  const drawStat = (col, label, value, sub) => {
    const colW = (CONTENT_W - 6) / 4;
    const x = MARGIN + col * (colW + 2);
    doc.setFillColor(248,243,237).rect(x, y, colW, 26, "F");
    doc.setFont("helvetica","bold").setFontSize(18).setTextColor(30,61,47);
    doc.text(value, x + colW/2, y+10, { align:"center" });
    doc.setFont("helvetica","normal").setFontSize(8).setTextColor(80,80,80);
    // Wrap the label if too long
    const labelLines = doc.splitTextToSize(label, colW - 4);
    doc.text(labelLines, x + colW/2, y+15, { align:"center" });
    if (sub) {
      doc.setFontSize(7).setTextColor(150,150,150);
      doc.text(sub, x + colW/2, y+22, { align:"center" });
    }
  };
  drawStat(0, "Avg Pain (/5)",     fmtNum(avgPain),    null);
  drawStat(1, "Flare Days",        `${flareDays}`,     `${flareRate}% of logged`);
  drawStat(2, "Avg Fatigue (/5)",  fmtNum(avgFatigue), null);
  drawStat(3, "Avg Skin (/5)",     fmtNum(avgSkin),    null);
  y += 31;

  // Note explaining what "Flare Days" means - now in plain language
  doc.setFont("helvetica","italic").setFontSize(7).setTextColor(120,120,120);
  doc.text("Flare days = days where overall pain was rated 3 (Moderate) or higher.", MARGIN, y);
  y += 5;

  // Morning soreness breakdown
  if (morningLogged > 0) {
    doc.setFont("helvetica","bold").setFontSize(11).setTextColor(30,61,47);
    doc.text("Morning Stiffness", MARGIN, y);
    y += 6;
    const labels = ["Fine","Stiff","Very Sore"];
    const colors = [[200,230,201],[255,224,178],[255,205,210]];
    const totalW = CONTENT_W;
    let xPos = MARGIN;
    [1,2,3].forEach(v => {
      const pct = morningCounts[v] / morningLogged;
      const segW = pct * totalW;
      if (segW > 0) {
        doc.setFillColor(...colors[v-1]).rect(xPos, y, segW, 6, "F");
        if (segW > 18) {
          doc.setFont("helvetica","bold").setFontSize(8).setTextColor(40,40,40);
          doc.text(`${Math.round(pct*100)}%`, xPos + segW/2, y+4, { align:"center" });
        }
        xPos += segW;
      }
    });
    y += 9;
    doc.setFont("helvetica","normal").setFontSize(8).setTextColor(120,120,120);
    [1,2,3].forEach((v,i) => {
      const cx = MARGIN + i * (CONTENT_W/3);
      doc.setFillColor(...colors[v-1]).rect(cx, y, 3, 3, "F");
      doc.text(`${labels[i]}: ${morningCounts[v]} day${morningCounts[v]===1?"":"s"}`, cx+5, y+2.5);
    });
    y += 10;
  }

  // ─── Top affected joints ────────────────────────────────────────────────────
  newPageIfNeeded(60);
  doc.setDrawColor(236,229,220).line(MARGIN, y, PAGE_W-MARGIN, y);
  y += 6;
  doc.setFont("helvetica","bold").setFontSize(13).setTextColor(30,61,47);
  doc.text("Most Affected Joints", MARGIN, y);
  y += 7;

  if (topJoints.length === 0) {
    doc.setFont("helvetica","italic").setFontSize(10).setTextColor(150,150,150);
    doc.text("No painful joints recorded in this period.", MARGIN, y);
    y += 7;
  } else {
    // Column layout (in mm from MARGIN; CONTENT_W ~ 180mm)
    const COL_JOINT     = 0;
    const COL_BAR_X     = 60;
    const COL_BAR_W     = 32;
    const COL_PAIN_NUM  = 96;     // pain number after the bar
    const COL_DAYS      = 130;
    const COL_SWOLLEN   = 155;

    // Table headers
    doc.setFont("helvetica","bold").setFontSize(8).setTextColor(120,120,120);
    doc.text("JOINT",     MARGIN + COL_JOINT,    y);
    doc.text("AVG PAIN",  MARGIN + COL_BAR_X,    y);
    doc.text("DAYS",      MARGIN + COL_DAYS,     y);
    doc.text("SWOLLEN",   MARGIN + COL_SWOLLEN,  y);
    y += 4;
    doc.setDrawColor(236,229,220).line(MARGIN, y, PAGE_W-MARGIN, y);
    y += 5;

    topJoints.forEach(j => {
      newPageIfNeeded(8);
      doc.setFont("helvetica","normal").setFontSize(10).setTextColor(30,61,47);
      doc.text(j.label, MARGIN + COL_JOINT, y);

      // Pain bar
      const barX = MARGIN + COL_BAR_X, barY = y-3, barH = 4;
      doc.setFillColor(240,232,224).rect(barX, barY, COL_BAR_W, barH, "F");
      const fillW = (j.avg/5) * COL_BAR_W;
      const colorIdx = Math.min(5, Math.round(j.avg));
      doc.setFillColor(...PAIN_RGB_FG[colorIdx]).rect(barX, barY, fillW, barH, "F");

      // Pain numeric value (positioned at COL_PAIN_NUM, well clear of DAYS at 130)
      doc.setFont("helvetica","bold").setFontSize(10).setTextColor(...PAIN_RGB_FG[colorIdx]);
      doc.text(j.avg.toFixed(1), MARGIN + COL_PAIN_NUM, y);

      // Days
      doc.setFont("helvetica","normal").setTextColor(80,80,80);
      doc.text(`${j.days}`, MARGIN + COL_DAYS, y);

      // Swollen (use ASCII "-" instead of em-dash to avoid font encoding issues)
      doc.setTextColor(j.swelling>0?59:120, j.swelling>0?130:120, j.swelling>0?246:120);
      doc.text(j.swelling>0 ? `${j.swelling}d` : "-", MARGIN + COL_SWOLLEN, y);
      y += 6;
    });
    y += 3;
  }

  // ─── Notable patterns ───────────────────────────────────────────────────────
  newPageIfNeeded(40);
  doc.setDrawColor(236,229,220).line(MARGIN, y, PAGE_W-MARGIN, y);
  y += 6;
  doc.setFont("helvetica","bold").setFontSize(13).setTextColor(30,61,47);
  doc.text("Notable Patterns", MARGIN, y);
  y += 7;

  const patterns = [];

  // Exercise effect
  const exDays   = logs.filter(l=>l.exercise && l.exercise!=="None");
  const noExDays = logs.filter(l=>!l.exercise || l.exercise==="None");
  if (exDays.length>=3 && noExDays.length>=3) {
    const ex = avg(exDays.map(l=>l.overallPain));
    const nx = avg(noExDays.map(l=>l.overallPain));
    if (Math.abs(ex-nx) >= 0.3) {
      patterns.push(`Exercise: pain averages ${Math.abs(ex-nx).toFixed(1)} points ${ex<nx?"lower":"higher"} on activity days (${exDays.length} active vs ${noExDays.length} rest days).`);
    }
  }

  // Alcohol effect (simple same-day for the report)
  const alcDays   = logs.filter(l=>(l.alcohol||0)>0);
  const noAlcDays = logs.filter(l=>(l.alcohol||0)===0);
  if (alcDays.length>=3 && noAlcDays.length>=3) {
    const a = avg(alcDays.map(l=>l.overallPain));
    const na = avg(noAlcDays.map(l=>l.overallPain));
    if (Math.abs(a-na) >= 0.3) {
      patterns.push(`Alcohol: pain averages ${Math.abs(a-na).toFixed(1)} points ${a>na?"higher":"lower"} on drinking days (${alcDays.length} drinking vs ${noAlcDays.length} dry days).`);
    }
  }

  // Sleep
  const lowSleep  = logs.filter(l=>l.sleep<6).map(l=>l.overallPain);
  const goodSleep = logs.filter(l=>l.sleep>=7).map(l=>l.overallPain);
  if (lowSleep.length>=3 && goodSleep.length>=3) {
    const ls = avg(lowSleep), gs = avg(goodSleep);
    if (Math.abs(ls-gs) >= 0.3) {
      patterns.push(`Sleep: pain averages ${Math.abs(ls-gs).toFixed(1)} points ${ls>gs?"higher":"lower"} on nights with under 6 hours sleep.`);
    }
  }

  // Skin/joint correlation
  const skinFlareDays = logs.filter(l=>(l.skinFlare||0)>=2);
  const clearSkinDays = logs.filter(l=>(l.skinFlare||0)<2);
  if (skinFlareDays.length>=3 && clearSkinDays.length>=3) {
    const sf = avg(skinFlareDays.map(l=>l.overallPain));
    const cs = avg(clearSkinDays.map(l=>l.overallPain));
    if (Math.abs(sf-cs) >= 0.3) {
      patterns.push(`Skin and joint link: joint pain averages ${Math.abs(sf-cs).toFixed(1)} points ${sf>cs?"higher":"lower"} on days when skin is also flaring.`);
    }
  }

  doc.setFont("helvetica","normal").setFontSize(10).setTextColor(50,50,50);
  if (patterns.length === 0) {
    doc.setFont("helvetica","italic").setTextColor(150,150,150);
    doc.text("No statistically notable patterns detected in this period.", MARGIN, y);
    y += 7;
  } else {
    patterns.forEach(p => {
      newPageIfNeeded(12);
      const lines = doc.splitTextToSize("- " + p, CONTENT_W - 4);
      doc.text(lines, MARGIN, y);
      y += lines.length * 5 + 2;
    });
  }

  // ─── PAGE 2: Visual section ─────────────────────────────────────────────────
  doc.addPage();
  y = MARGIN + 5;
  addPageHeader();

  // Pain trend line chart
  doc.setFont("helvetica","bold").setFontSize(13).setTextColor(30,61,47);
  doc.text("Pain Trend Over Time", MARGIN, y);
  y += 8;

  const chartH = 50;
  const chartX = MARGIN, chartY = y, chartW = CONTENT_W;
  // Background
  doc.setFillColor(252,250,247).rect(chartX, chartY, chartW, chartH, "F");
  // Grid lines
  doc.setDrawColor(240,232,224).setLineWidth(0.2);
  for (let v=0; v<=5; v++) {
    const gy = chartY + chartH - (v/5)*chartH;
    doc.line(chartX, gy, chartX+chartW, gy);
    doc.setFont("helvetica","normal").setFontSize(7).setTextColor(150,150,150);
    doc.text(`${v}`, chartX-3, gy+1, { align:"right" });
  }
  // Plot line
  if (logs.length > 1) {
    const xStep = chartW / (logs.length-1);
    doc.setDrawColor(44,95,74).setLineWidth(0.6);
    for (let i=1; i<logs.length; i++) {
      const x1 = chartX + (i-1)*xStep, y1 = chartY + chartH - (logs[i-1].overallPain/5)*chartH;
      const x2 = chartX + i*xStep,     y2 = chartY + chartH - (logs[i].overallPain/5)*chartH;
      doc.line(x1, y1, x2, y2);
    }
    // Dots
    logs.forEach((l,i) => {
      const cx = chartX + i*xStep, cy = chartY + chartH - (l.overallPain/5)*chartH;
      doc.setFillColor(44,95,74).circle(cx, cy, 0.7, "F");
    });
    // X-axis labels (first, middle, last)
    doc.setFontSize(7).setTextColor(150,150,150);
    doc.text(fmtDateShort(logs[0].date), chartX, chartY+chartH+5);
    if (logs.length > 2) {
      const mid = Math.floor(logs.length/2);
      doc.text(fmtDateShort(logs[mid].date), chartX + mid*xStep, chartY+chartH+5, { align:"center" });
    }
    doc.text(fmtDateShort(logs[logs.length-1].date), chartX+chartW, chartY+chartH+5, { align:"right" });
  }
  y += chartH + 10;

  // ─── Calendar heatmap (one mini-calendar per month) ─────────────────────────
  newPageIfNeeded(50);
  doc.setFont("helvetica","bold").setFontSize(13).setTextColor(30,61,47);
  doc.text("Daily Pain Calendar", MARGIN, y);
  y += 7;
  doc.setFont("helvetica","normal").setFontSize(8).setTextColor(120,120,120);
  doc.text("Each cell shows pain level for that day. Empty cells = not logged.", MARGIN, y);
  y += 6;

  // Build months covered
  const months = new Set();
  logs.forEach(l => months.add(l.date.slice(0,7)));
  const monthList = Array.from(months).sort();

  const byDate = {};
  logs.forEach(l => { byDate[l.date] = l; });

  // Layout: 2 mini-calendars per row, side by side
  const calsPerRow = 2;
  const calGap = 8;
  const calW = (CONTENT_W - calGap*(calsPerRow-1)) / calsPerRow;
  const cellSize = calW / 7;
  const calH = cellSize * 7 + 8; // 6 weeks + header + label

  monthList.forEach((ym, idx) => {
    const col = idx % calsPerRow;
    const rowStart = (idx % calsPerRow === 0);
    if (rowStart) newPageIfNeeded(calH + 5);
    const cx = MARGIN + col * (calW + calGap);
    const cy = y;

    // Month label
    const [yy, mm] = ym.split("-").map(Number);
    const monthDate = new Date(yy, mm-1, 1);
    doc.setFont("helvetica","bold").setFontSize(10).setTextColor(30,61,47);
    doc.text(monthDate.toLocaleDateString("en-GB",{month:"long",year:"numeric"}), cx, cy);

    // Day headers
    const headY = cy + 3;
    doc.setFont("helvetica","normal").setFontSize(7).setTextColor(150,150,150);
    ["M","T","W","T","F","S","S"].forEach((d,i) => {
      doc.text(d, cx + i*cellSize + cellSize/2, headY+3, { align:"center" });
    });

    // Cells
    const firstWeekday = (monthDate.getDay()+6)%7;
    const daysInMonth = new Date(yy, mm, 0).getDate();
    const gridY = headY + 5;
    for (let d=1; d<=daysInMonth; d++) {
      const dayIndex = firstWeekday + d - 1;
      const row = Math.floor(dayIndex/7), colIdx = dayIndex%7;
      const cellX = cx + colIdx*cellSize;
      const cellY = gridY + row*cellSize;
      const dateKey = `${ym}-${String(d).padStart(2,"0")}`;
      const entry = byDate[dateKey];
      // Background
      if (entry) {
        const p = entry.overallPain || 0;
        doc.setFillColor(...PAIN_RGB[p]).rect(cellX+0.3, cellY+0.3, cellSize-0.6, cellSize-0.6, "F");
        doc.setFont("helvetica","bold").setFontSize(7).setTextColor(...PAIN_RGB_FG[p]);
      } else {
        doc.setFillColor(245,240,235).rect(cellX+0.3, cellY+0.3, cellSize-0.6, cellSize-0.6, "F");
        doc.setFont("helvetica","normal").setFontSize(7).setTextColor(200,190,180);
      }
      doc.text(`${d}`, cellX + cellSize/2, cellY + cellSize/2 + 1.5, { align:"center" });
    }

    if (col === calsPerRow-1 || idx === monthList.length-1) {
      y += calH + 5;
    }
  });

  // ─── Flare episodes ─────────────────────────────────────────────────────────
  // A "flare" = 3+ consecutive days with pain >= 3
  const flares = [];
  let runStart = null, runDays = [];
  for (let i=0; i<logs.length; i++) {
    const l = logs[i];
    const isFlare = (l.overallPain||0) >= 3;
    const prev = i>0 ? logs[i-1] : null;
    const dayGap = prev ? Math.round((new Date(l.date)-new Date(prev.date))/86400000) : 1;
    if (isFlare && (runStart === null || dayGap > 1)) {
      // Flush previous run if existed
      if (runStart !== null && runDays.length >= 3) {
        flares.push({ start: runStart, end: runDays[runDays.length-1].date, peak: Math.max(...runDays.map(d=>d.overallPain||0)), days: runDays.length });
      }
      runStart = l.date; runDays = [l];
    } else if (isFlare && dayGap === 1) {
      runDays.push(l);
    } else {
      if (runStart !== null && runDays.length >= 3) {
        flares.push({ start: runStart, end: runDays[runDays.length-1].date, peak: Math.max(...runDays.map(d=>d.overallPain||0)), days: runDays.length });
      }
      runStart = null; runDays = [];
    }
  }
  if (runStart !== null && runDays.length >= 3) {
    flares.push({ start: runStart, end: runDays[runDays.length-1].date, peak: Math.max(...runDays.map(d=>d.overallPain||0)), days: runDays.length });
  }

  newPageIfNeeded(40);
  doc.setFont("helvetica","bold").setFontSize(13).setTextColor(30,61,47);
  doc.text("Flare Episodes", MARGIN, y);
  y += 5;
  doc.setFont("helvetica","normal").setFontSize(8).setTextColor(120,120,120);
  doc.text("Periods of 3+ consecutive days with pain at level 3 or higher.", MARGIN, y);
  y += 6;

  if (flares.length === 0) {
    doc.setFont("helvetica","italic").setFontSize(10).setTextColor(150,150,150);
    doc.text("No flare episodes meeting the criteria in this period.", MARGIN, y);
    y += 7;
  } else {
    flares.forEach(f => {
      newPageIfNeeded(8);
      doc.setFillColor(...PAIN_RGB[f.peak]).rect(MARGIN, y-3, 3, 5, "F");
      doc.setFont("helvetica","normal").setFontSize(10).setTextColor(50,50,50);
      doc.text(`${fmtDate(f.start)} - ${fmtDate(f.end)}`, MARGIN+5, y);
      doc.setFont("helvetica","bold").setTextColor(...PAIN_RGB_FG[f.peak]);
      doc.text(`${f.days} day${f.days===1?"":"s"} | peaked at ${f.peak}/5`, PAGE_W-MARGIN, y, { align:"right" });
      y += 6;
    });
  }

  // ─── PAGE 3: Daily entries reference table ──────────────────────────────────
  doc.addPage();
  y = MARGIN + 5;
  addPageHeader();
  doc.setFont("helvetica","bold").setFontSize(13).setTextColor(30,61,47);
  doc.text("Daily Entries", MARGIN, y);
  y += 7;

  // Headers
  doc.setFont("helvetica","bold").setFontSize(8).setTextColor(120,120,120);
  doc.text("DATE",     MARGIN,        y);
  doc.text("PAIN",     MARGIN+38,     y);
  doc.text("MORN",     MARGIN+52,     y);
  doc.text("FATG",     MARGIN+66,     y);
  doc.text("SKIN",     MARGIN+80,     y);
  doc.text("SLP",      MARGIN+94,     y);
  doc.text("EX",       MARGIN+106,    y);
  doc.text("ALC",      MARGIN+118,    y);
  doc.text("NOTES",    MARGIN+132,    y);
  y += 3;
  doc.setDrawColor(220,210,200).line(MARGIN, y, PAGE_W-MARGIN, y);
  y += 3.5;

  doc.setFont("helvetica","normal").setFontSize(8);
  logs.forEach(l => {
    newPageIfNeeded(7);
    const morningTxt = l.morning ? ["","F","S","V"][l.morning] : "—";
    doc.setTextColor(50,50,50);
    doc.text(fmtDateShort(l.date), MARGIN, y);
    // Pain with colour pip
    const p = l.overallPain || 0;
    doc.setFillColor(...PAIN_RGB[p]).rect(MARGIN+38, y-2.5, 4, 3.5, "F");
    doc.setTextColor(...PAIN_RGB_FG[p]);
    doc.text(`${p}`, MARGIN+43.5, y);
    doc.setTextColor(50,50,50);
    doc.text(morningTxt,             MARGIN+52, y);
    doc.text(`${l.fatigue||0}`,      MARGIN+66, y);
    doc.text(`${l.skinFlare||0}`,    MARGIN+80, y);
    doc.text(`${l.sleep||0}h`,       MARGIN+94, y);
    doc.text(l.exercise && l.exercise!=="None" ? "Y" : "-", MARGIN+106, y);
    doc.text(`${l.alcohol||0}`,      MARGIN+118, y);
    if (l.notes) {
      const noteLines = doc.splitTextToSize(l.notes, CONTENT_W - 132 + MARGIN);
      doc.setTextColor(100,100,100);
      doc.text(noteLines.slice(0,1)[0] + (noteLines.length>1?"...":""), MARGIN+132, y);
    }
    y += 5;
  });

  // Legend at bottom for the morning column shorthand
  newPageIfNeeded(15);
  y += 4;
  doc.setDrawColor(236,229,220).line(MARGIN, y, PAGE_W-MARGIN, y);
  y += 5;
  doc.setFont("helvetica","italic").setFontSize(7).setTextColor(150,150,150);
  doc.text("Morning soreness: F = Fine, S = Stiff, V = Very Sore. Pain/Fatigue/Skin scaled 0-5. EX = exercised that day. ALC = alcohol units.", MARGIN, y);
  y += 4;
  doc.text("Generated by PsA Journal | Patterns shown are statistical only and not a substitute for clinical interpretation.", MARGIN, y);

  return doc;
}

function CalendarHeatmap({ logs, onEditEntry, onAddMissedDay }) {
  const today = new Date(todayStr()+"T12:00:00");
  const [viewDate, setViewDate] = useState(new Date(today.getFullYear(), today.getMonth(), 1));
  const [metric, setMetric] = useState("overallPain");

  const METRICS = [
    { key:"overallPain", label:"Pain",    accent:"#C62828" },
    { key:"fatigue",     label:"Fatigue", accent:"#6A4C93" },
    { key:"skinFlare",   label:"Skin",    accent:"#B85C38" },
  ];

  // Build a date->log map for fast lookup
  const byDate = {};
  logs.forEach(l => { byDate[l.date] = l; });

  const year  = viewDate.getFullYear();
  const month = viewDate.getMonth();
  const monthLabel = viewDate.toLocaleDateString("en-GB", { month:"long", year:"numeric" });
  const firstDay   = new Date(year, month, 1);
  const lastDay    = new Date(year, month+1, 0);
  const daysInMonth = lastDay.getDate();

  // Mon-first column: getDay() returns 0=Sun..6=Sat. Convert: Mon=0, Sun=6
  const firstCol = (firstDay.getDay() + 6) % 7;

  const fmtDate = (d) => d.toISOString().split("T")[0];
  const todayKey = fmtDate(today);

  const goPrev = () => setViewDate(new Date(year, month-1, 1));
  const goNext = () => setViewDate(new Date(year, month+1, 1));
  const isCurrentMonth = year === today.getFullYear() && month === today.getMonth();

  // Build the grid: array of cells (null for empty padding cells)
  const cells = [];
  for (let i=0; i<firstCol; i++) cells.push(null);
  for (let d=1; d<=daysInMonth; d++) {
    const date = new Date(year, month, d);
    const key  = fmtDate(date);
    const entry = byDate[key];
    const isFuture = date > today;
    const isToday  = key === todayKey;
    const value = entry ? (entry[metric]||0) : null;
    cells.push({ d, key, entry, isFuture, isToday, value });
  }

  const handleTap = (cell) => {
    if (cell.isFuture) return;
    if (cell.entry) onEditEntry(cell.key);
    else onAddMissedDay(cell.key);
  };

  const cellBg = (cell) => {
    if (cell.isFuture) return "#FAF7F2";
    if (cell.value === null) return "#F5F0EB";  // not logged
    return PAIN_BG[cell.value];
  };
  const cellFg = (cell) => {
    if (cell.isFuture) return "#D6CFC5";
    if (cell.value === null) return "#C9BBAB";
    return PAIN_FG[cell.value];
  };

  const DAY_HEADERS = ["M","T","W","T","F","S","S"];

  return (
    <div>
      {/* Metric switcher */}
      <div style={{ display:"flex", gap:6, marginBottom:14 }}>
        {METRICS.map(m => (
          <button key={m.key} onClick={() => setMetric(m.key)} style={{
            flex:1, padding:"8px 0", borderRadius:8,
            border:`1.5px solid ${metric===m.key ? m.accent : "#E2D9CE"}`,
            background: metric===m.key ? m.accent : "#fff",
            color: metric===m.key ? "#fff" : "#7a7069",
            cursor:"pointer", fontSize:12, fontWeight:600,
          }}>{m.label}</button>
        ))}
      </div>

      {/* Month nav */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <button onClick={goPrev} style={{
          padding:"6px 12px", borderRadius:8, border:"1px solid #E2D9CE",
          background:"#fff", cursor:"pointer", fontSize:14, color:"#2C5F4A", fontWeight:600,
        }}>‹</button>
        <div style={{ fontFamily:"'Lora',serif", fontWeight:700, fontSize:15, color:"#1e3d2f" }}>{monthLabel}</div>
        <button onClick={goNext} disabled={isCurrentMonth} style={{
          padding:"6px 12px", borderRadius:8,
          border:`1px solid ${isCurrentMonth ? "#F0E8E0" : "#E2D9CE"}`,
          background:"#fff", cursor: isCurrentMonth ? "not-allowed" : "pointer",
          fontSize:14, color: isCurrentMonth ? "#D6CFC5" : "#2C5F4A", fontWeight:600,
        }}>›</button>
      </div>

      {/* Day headers */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(7, 1fr)", gap:4, marginBottom:4 }}>
        {DAY_HEADERS.map((h,i) => (
          <div key={i} style={{ textAlign:"center", fontSize:10, color:"#9a9189", fontWeight:600 }}>{h}</div>
        ))}
      </div>

      {/* Day cells */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(7, 1fr)", gap:4 }}>
        {cells.map((c,i) => c ? (
          <button key={i} onClick={() => handleTap(c)} disabled={c.isFuture}
            style={{
              aspectRatio:"1/1", border:c.isToday ? "2px solid #2C5F4A" : "1px solid transparent",
              borderRadius:7, background:cellBg(c), color:cellFg(c),
              cursor: c.isFuture ? "not-allowed" : "pointer",
              fontSize:13, fontWeight: c.entry ? 700 : 500,
              fontFamily:"'DM Sans',sans-serif",
              display:"flex", alignItems:"center", justifyContent:"center",
              padding:0, transition:"transform .1s",
            }}>
            {c.d}
          </button>
        ) : <div key={i}/>)}
      </div>

      {/* Legend */}
      <div style={{ marginTop:14, display:"flex", alignItems:"center", gap:8, justifyContent:"center" }}>
        <span style={{ fontSize:10, color:"#9a9189" }}>None</span>
        {[0,1,2,3,4,5].map(v => (
          <div key={v} style={{ width:18, height:14, background:PAIN_BG[v],
            borderRadius:3, border:`1px solid ${PAIN_FG[v]}30` }}/>
        ))}
        <span style={{ fontSize:10, color:"#9a9189" }}>Severe</span>
        <div style={{ width:18, height:14, background:"#F5F0EB",
          borderRadius:3, border:"1px solid #C9BBAB", marginLeft:8 }}/>
        <span style={{ fontSize:10, color:"#9a9189" }}>Not logged</span>
      </div>

      <div style={{ fontSize:11, color:"#9a9189", textAlign:"center", marginTop:10, fontStyle:"italic" }}>
        Tap a day to view or edit · Today is outlined
      </div>
    </div>
  );
}

          placeholder="Anything else today? New medications, stress, travel, how you felt generally..."
          style={{ width:"100%", minHeight:80, border:"1.5px solid #E2D9CE", borderRadius:10,
            padding:12, fontFamily:"inherit", fontSize:13, color:"#1e3d2f",

      <div style={{ paddingBottom:36 }}>

          width:"100%", padding:"15px 0",

          color:"#fff", border:"none", borderRadius:13, fontSize:16,

        }}>{saveMsg || (isPast ? (isNewEntry ? "Save Entry" : "Update Entry") : "Save Today's Entry")}</button>
      </div>
    </div>
  );
}
