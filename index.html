<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1e3d2f">
<meta name="description" content="Private symptom tracker for Psoriatic Arthritis — log daily pain, triggers, and see patterns over time.">
<title>PsA Journal</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap">

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

<style>
  * { box-sizing:border-box; margin:0; }
  html, body { margin:0; padding:0; background:#FAF7F2; -webkit-font-smoothing:antialiased; }
  body { font-family:'DM Sans',system-ui,sans-serif; color:#1e3d2f; }
  input[type=range] { width:100%; height:6px; border-radius:3px; outline:none; cursor:pointer; }
  button { font-family:inherit; }
  #root { min-height:100vh; }
  .loader { display:flex; align-items:center; justify-content:center; height:100vh; font-family:'Lora',serif; color:#2C5F4A; font-size:18px; }
</style>
</head>
<body>
<div id="root"><div class="loader">Loading your journal…</div></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// ─── Data ─────────────────────────────────────────────────────────────────────

const JOINTS = [
  { id:"fingers_l", label:"Left Fingers" }, { id:"fingers_r", label:"Right Fingers" },
  { id:"wrist_l",   label:"Left Wrist" },   { id:"wrist_r",   label:"Right Wrist" },
  { id:"elbow_l",   label:"Left Elbow" },   { id:"elbow_r",   label:"Right Elbow" },
  { id:"shoulder_l",label:"Left Shoulder"}, { id:"shoulder_r",label:"Right Shoulder"},
  { id:"hip_l",     label:"Left Hip" },     { id:"hip_r",     label:"Right Hip" },
  { id:"knee_l",    label:"Left Knee" },    { id:"knee_r",    label:"Right Knee" },
  { id:"ankle_l",   label:"Left Ankle" },   { id:"ankle_r",   label:"Right Ankle" },
  { id:"toes_l",    label:"Left Toes" },    { id:"toes_r",    label:"Right Toes" },
  { id:"lower_back",label:"Lower Back" },   { id:"neck",      label:"Neck" },
];

const TRIGGERS = [
  { id:"dairy",         label:"Dairy",          emoji:"🧀" },
  { id:"gluten",        label:"Gluten/Wheat",   emoji:"🍞" },
  { id:"refined-carbs", label:"Refined Carbs",  emoji:"🥖" },
  { id:"processed",     label:"Processed Food", emoji:"🌭" },
  { id:"fried",         label:"Fried Foods",    emoji:"🍳" },
  { id:"sugar",         label:"Sugar/Sweets",   emoji:"🍬" },
  { id:"nightshades",   label:"Nightshades",    emoji:"🍅" },
  { id:"red-meat",      label:"Red Meat",       emoji:"🥩" },
  { id:"eggs",          label:"Eggs",           emoji:"🥚" },
];

const POSITIVES = [
  { id:"oily-fish",  label:"Oily Fish",       emoji:"🐟" },
  { id:"vegetables", label:"Fruits & Veg",    emoji:"🥦" },
  { id:"berries",    label:"Berries",         emoji:"🫐" },
  { id:"olive-oil",  label:"Olive Oil",       emoji:"🫒" },
  { id:"fermented",  label:"Fermented Foods", emoji:"🫙" },
  { id:"nuts",       label:"Nuts & Seeds",    emoji:"🥜" },
  { id:"turmeric",   label:"Turmeric",        emoji:"🌿" },
];

const ALL_FOODS = [...TRIGGERS, ...POSITIVES];
const EXERCISE_OPTS = ["None","Walking","Yoga / Stretching","Swimming","Cycling","Strength Training","Running","Other"];
const WEATHER_OPTS  = ["☀️ Sunny","⛅ Cloudy","🌧️ Rainy","🌬️ Windy","❄️ Cold","💧 Humid","🌡️ Hot"];

const MORNING_LBLS = ["–","Fine","Stiff","Very Sore"];
const MORNING_BG   = ["#F0E8E0","#E8F5E9","#FFE0B2","#FFCDD2"];
const MORNING_FG   = ["#9a9189","#388E3C","#EF6C00","#B71C1C"];

const PAIN_BG   = ["#E8F5E9","#C8E6C9","#FFF9C4","#FFE0B2","#FFCCBC","#FFCDD2"];
const PAIN_FG   = ["#388E3C","#2E7D32","#F9A825","#EF6C00","#BF360C","#B71C1C"];
const PAIN_LBLS = ["None","Very Mild","Mild","Moderate","Severe","Very Severe"];
const pb = v => PAIN_BG[v]   ?? PAIN_BG[0];
const pf = v => PAIN_FG[v]   ?? PAIN_FG[0];
const pl = v => PAIN_LBLS[v] ?? "";

const todayStr = () => new Date().toISOString().split("T")[0];

const emptyLog = () => ({
  date:todayStr(), overallPain:0, joints:{}, swelling:{},
  foods:[], exercise:"None", exerciseMins:0,
  alcohol:0, stress:0, sleep:7, weather:[], notes:"",
  skinFlare:0,
  fatigue:0,
  morning:0,
});

// ─── Storage: localStorage with in-memory fallback ────────────────────────────

const SKEY = "psa-tracker-v1";
let _cache = [];

function readLogs() {
  try {
    const raw = localStorage.getItem(SKEY);
    if (raw) { _cache = JSON.parse(raw); return _cache; }
  } catch (_) {}
  return _cache;
}

function writeLogs(logs) {
  _cache = logs;
  try { localStorage.setItem(SKEY, JSON.stringify(logs)); } catch (_) {}
  return true;
}

// ─── Small components ─────────────────────────────────────────────────────────

function Card({ title, emoji, children, style }) {
  return (
    <div style={{ background:"#fff", borderRadius:16, padding:"18px 20px", marginBottom:14,
      border:"1px solid #ECE5DC", boxShadow:"0 2px 14px rgba(44,95,74,.06)", ...style }}>
      {title && (
        <h3 style={{ margin:"0 0 14px", fontFamily:"'Lora',Georgia,serif", fontSize:17,
          fontWeight:700, color:"#1e3d2f", display:"flex", alignItems:"center", gap:8 }}>
          <span>{emoji}</span>{title}
        </h3>
      )}
      {children}
    </div>
  );
}

function Chip({ label, active, onClick, color="#2C5F4A" }) {
  return (
    <button onClick={onClick} style={{
      padding:"6px 14px", borderRadius:20,
      border:`1.5px solid ${active ? color : "#E2D9CE"}`,
      background: active ? color : "#fff",
      color: active ? "#fff" : "#7a7069",
      cursor:"pointer", fontSize:13,
      fontWeight: active ? 500 : 400, transition:"all .15s", whiteSpace:"nowrap",
    }}>{label}</button>
  );
}

function Stepper({ value, onChange, min=0, step=1, suffix="" }) {
  return (
    <div style={{ display:"flex", alignItems:"center", gap:10,
      background:"#F7F2EC", borderRadius:10, padding:"5px 14px", width:"fit-content" }}>
      <button onClick={() => onChange(Math.max(min, value - step))}
        style={{ width:30, height:30, borderRadius:7, border:"1px solid #E2D9CE",
          background:"#fff", cursor:"pointer", fontSize:18, fontWeight:700, color:"#2C5F4A", lineHeight:1 }}>−</button>
      <span style={{ minWidth:40, textAlign:"center", fontFamily:"'Lora',serif",
        fontWeight:700, fontSize:16, color:"#1e3d2f" }}>{value}{suffix}</span>
      <button onClick={() => onChange(value + step)}
        style={{ width:30, height:30, borderRadius:7, border:"1px solid #E2D9CE",
          background:"#fff", cursor:"pointer", fontSize:18, fontWeight:700, color:"#2C5F4A", lineHeight:1 }}>+</button>
    </div>
  );
}

function ScaleDots({ value, onChange }) {
  return (
    <div style={{ display:"flex", gap:6 }}>
      {[0,1,2,3,4,5].map(v => (
        <button key={v} onClick={() => onChange(v)} style={{
          width:36, height:36, borderRadius:9,
          border:`2px solid ${value===v ? pf(v) : "#E2D9CE"}`,
          background: value===v ? pb(v) : "#faf7f3",
          cursor:"pointer", fontWeight:700, fontSize:14,
          color: value===v ? pf(v) : "#b0a99f", transition:"all .12s",
        }}>{v}</button>
      ))}
    </div>
  );
}

// Simple SVG line chart (no external dependencies) ────────────────────────────
function SimpleLineChart({ data }) {
  if (!data.length) return null;
  const w = 320, h = 160, padL = 24, padR = 6, padT = 8, padB = 28;
  const maxX = Math.max(data.length - 1, 1);
  const xScale = i => padL + (i / maxX) * (w - padL - padR);
  const yScale = v => h - padB - (v / 5) * (h - padT - padB);
  const points = data.map((d, i) => `${xScale(i)},${yScale(d.pain)}`).join(" ");
  const showEvery = Math.max(1, Math.ceil(data.length / 7));

  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width:"100%", height:160, overflow:"visible" }}>
      {[0,1,2,3,4,5].map(y => (
        <g key={y}>
          <line x1={padL} y1={yScale(y)} x2={w-padR} y2={yScale(y)}
            stroke="#F0E8E0" strokeDasharray="3 3" />
          <text x={padL-4} y={yScale(y)+3} fontSize="9" fill="#9a9189" textAnchor="end">{y}</text>
        </g>
      ))}
      {data.map((d,i) => i % showEvery === 0 ? (
        <text key={i} x={xScale(i)} y={h-10} fontSize="9" fill="#9a9189" textAnchor="middle">{d.date}</text>
      ) : null)}
      <polyline points={points} fill="none" stroke="#2C5F4A" strokeWidth="2.5"
        strokeLinecap="round" strokeLinejoin="round" />
      {data.map((d,i) => (
        <circle key={i} cx={xScale(i)} cy={yScale(d.pain)} r="3.5" fill="#2C5F4A" />
      ))}
    </svg>
  );
}

// ─── Calendar Heatmap ─────────────────────────────────────────────────────────

function CalendarHeatmap({ logs, onEditEntry, onAddMissedDay }) {
  const today = new Date(todayStr()+"T12:00:00");
  const [viewDate, setViewDate] = useState(new Date(today.getFullYear(), today.getMonth(), 1));
  const [metric, setMetric] = useState("overallPain");

  const METRICS = [
    { key:"overallPain", label:"Pain",    accent:"#C62828" },
    { key:"fatigue",     label:"Fatigue", accent:"#6A4C93" },
    { key:"skinFlare",   label:"Skin",    accent:"#B85C38" },
  ];

  // Build a date->log map for fast lookup
  const byDate = {};
  logs.forEach(l => { byDate[l.date] = l; });

  const year  = viewDate.getFullYear();
  const month = viewDate.getMonth();
  const monthLabel = viewDate.toLocaleDateString("en-GB", { month:"long", year:"numeric" });
  const firstDay   = new Date(year, month, 1);
  const lastDay    = new Date(year, month+1, 0);
  const daysInMonth = lastDay.getDate();

  // Mon-first column: getDay() returns 0=Sun..6=Sat. Convert: Mon=0, Sun=6
  const firstCol = (firstDay.getDay() + 6) % 7;

  const fmtDate = (d) => d.toISOString().split("T")[0];
  const todayKey = fmtDate(today);

  const goPrev = () => setViewDate(new Date(year, month-1, 1));
  const goNext = () => setViewDate(new Date(year, month+1, 1));
  const isCurrentMonth = year === today.getFullYear() && month === today.getMonth();

  // Build the grid: array of cells (null for empty padding cells)
  const cells = [];
  for (let i=0; i<firstCol; i++) cells.push(null);
  for (let d=1; d<=daysInMonth; d++) {
    const date = new Date(year, month, d);
    const key  = fmtDate(date);
    const entry = byDate[key];
    const isFuture = date > today;
    const isToday  = key === todayKey;
    const value = entry ? (entry[metric]||0) : null;
    cells.push({ d, key, entry, isFuture, isToday, value });
  }

  const handleTap = (cell) => {
    if (cell.isFuture) return;
    if (cell.entry) onEditEntry(cell.key);
    else onAddMissedDay(cell.key);
  };

  const cellBg = (cell) => {
    if (cell.isFuture) return "#FAF7F2";
    if (cell.value === null) return "#F5F0EB";  // not logged
    return PAIN_BG[cell.value];
  };
  const cellFg = (cell) => {
    if (cell.isFuture) return "#D6CFC5";
    if (cell.value === null) return "#C9BBAB";
    return PAIN_FG[cell.value];
  };

  const DAY_HEADERS = ["M","T","W","T","F","S","S"];

  return (
    <div>
      {/* Metric switcher */}
      <div style={{ display:"flex", gap:6, marginBottom:14 }}>
        {METRICS.map(m => (
          <button key={m.key} onClick={() => setMetric(m.key)} style={{
            flex:1, padding:"8px 0", borderRadius:8,
            border:`1.5px solid ${metric===m.key ? m.accent : "#E2D9CE"}`,
            background: metric===m.key ? m.accent : "#fff",
            color: metric===m.key ? "#fff" : "#7a7069",
            cursor:"pointer", fontSize:12, fontWeight:600,
          }}>{m.label}</button>
        ))}
      </div>

      {/* Month nav */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <button onClick={goPrev} style={{
          padding:"6px 12px", borderRadius:8, border:"1px solid #E2D9CE",
          background:"#fff", cursor:"pointer", fontSize:14, color:"#2C5F4A", fontWeight:600,
        }}>‹</button>
        <div style={{ fontFamily:"'Lora',serif", fontWeight:700, fontSize:15, color:"#1e3d2f" }}>{monthLabel}</div>
        <button onClick={goNext} disabled={isCurrentMonth} style={{
          padding:"6px 12px", borderRadius:8,
          border:`1px solid ${isCurrentMonth ? "#F0E8E0" : "#E2D9CE"}`,
          background:"#fff", cursor: isCurrentMonth ? "not-allowed" : "pointer",
          fontSize:14, color: isCurrentMonth ? "#D6CFC5" : "#2C5F4A", fontWeight:600,
        }}>›</button>
      </div>

      {/* Day headers */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(7, 1fr)", gap:4, marginBottom:4 }}>
        {DAY_HEADERS.map((h,i) => (
          <div key={i} style={{ textAlign:"center", fontSize:10, color:"#9a9189", fontWeight:600 }}>{h}</div>
        ))}
      </div>

      {/* Day cells */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(7, 1fr)", gap:4 }}>
        {cells.map((c,i) => c ? (
          <button key={i} onClick={() => handleTap(c)} disabled={c.isFuture}
            style={{
              aspectRatio:"1/1", border:c.isToday ? "2px solid #2C5F4A" : "1px solid transparent",
              borderRadius:7, background:cellBg(c), color:cellFg(c),
              cursor: c.isFuture ? "not-allowed" : "pointer",
              fontSize:13, fontWeight: c.entry ? 700 : 500,
              fontFamily:"'DM Sans',sans-serif",
              display:"flex", alignItems:"center", justifyContent:"center",
              padding:0, transition:"transform .1s",
            }}>
            {c.d}
          </button>
        ) : <div key={i}/>)}
      </div>

      {/* Legend */}
      <div style={{ marginTop:14, display:"flex", alignItems:"center", gap:8, justifyContent:"center" }}>
        <span style={{ fontSize:10, color:"#9a9189" }}>None</span>
        {[0,1,2,3,4,5].map(v => (
          <div key={v} style={{ width:18, height:14, background:PAIN_BG[v],
            borderRadius:3, border:`1px solid ${PAIN_FG[v]}30` }}/>
        ))}
        <span style={{ fontSize:10, color:"#9a9189" }}>Severe</span>
        <div style={{ width:18, height:14, background:"#F5F0EB",
          borderRadius:3, border:"1px solid #C9BBAB", marginLeft:8 }}/>
        <span style={{ fontSize:10, color:"#9a9189" }}>Not logged</span>
      </div>

      <div style={{ fontSize:11, color:"#9a9189", textAlign:"center", marginTop:10, fontStyle:"italic" }}>
        Tap a day to view or edit · Today is outlined
      </div>
    </div>
  );
}

// ─── Log Tab ─────────────────────────────────────────────────────────────────

function LogTab({ log, setLog, onSave, saveMsg, onResetToToday, logs }) {
  const [openJoint, setOpenJoint] = useState(null);
  const isPast = log.date !== todayStr();
  const isNewEntry = !logs.some(l => l.date === log.date);
  const editDateLabel = new Date(log.date+"T12:00:00").toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"});

  const toggle = (field, id) => setLog(p => {
    const arr = p[field] || [];
    return { ...p, [field]: arr.includes(id) ? arr.filter(x=>x!==id) : [...arr, id] };
  });

  return (
    <div>
      {isPast && (
        <div style={{ background:"#FFF3E0", border:"1.5px solid #FFB74D", borderRadius:12,
          padding:"12px 14px", marginBottom:14, display:"flex", alignItems:"center",
          justifyContent:"space-between", gap:10 }}>
          <div>
            <div style={{ fontFamily:"'Lora',serif", fontWeight:700, fontSize:14, color:"#E65100" }}>
              {isNewEntry ? "➕ Logging a missed day" : "✏️ Editing past entry"}
            </div>
            <div style={{ fontSize:12, color:"#7a7069", marginTop:2 }}>{editDateLabel}</div>
          </div>
          <button onClick={onResetToToday} style={{
            padding:"7px 12px", borderRadius:8, border:"1.5px solid #E65100",
            background:"#fff", color:"#E65100", cursor:"pointer",
            fontSize:12, fontWeight:600, whiteSpace:"nowrap",
          }}>← Today</button>
        </div>
      )}

      <Card title="Overall Pain Today" emoji="🌡️">
        <div style={{ textAlign:"center", marginBottom:18 }}>
          <div style={{ fontSize:52, fontWeight:800, fontFamily:"'Lora',serif",
            color:pf(log.overallPain), lineHeight:1 }}>{log.overallPain}</div>
          <div style={{ fontSize:14, color:"#9a9189", marginTop:4 }}>{pl(log.overallPain)}</div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <span style={{ fontSize:11, color:"#9a9189" }}>None</span>
          <input type="range" min={0} max={5} value={log.overallPain}
            onChange={e => setLog(p=>({...p, overallPain:+e.target.value}))}
            style={{ flex:1, accentColor:"#2C5F4A" }} />
          <span style={{ fontSize:11, color:"#9a9189" }}>Severe</span>
        </div>
      </Card>

      <Card title="How sore did you feel this morning?" emoji="🌅">
        <p style={{ fontSize:13, color:"#9a9189", margin:"0 0 12px" }}>
          Morning stiffness duration & severity is a key PsA indicator your rheumatologist will ask about.
        </p>
        <div style={{ display:"flex", gap:8 }}>
          {[1,2,3].map(v => (
            <button key={v}
              onClick={() => setLog(p=>({...p, morning:v}))}
              style={{
                flex:1, padding:"14px 0", borderRadius:12,
                border:`2px solid ${log.morning===v ? MORNING_FG[v] : "#E2D9CE"}`,
                background: log.morning===v ? MORNING_BG[v] : "#fff",
                color: log.morning===v ? MORNING_FG[v] : "#9a9189",
                cursor:"pointer", fontWeight:700,
              }}>
              <div style={{ fontSize:24, fontFamily:"'Lora',serif", lineHeight:1 }}>{v}</div>
              <div style={{ fontSize:11, marginTop:6, fontWeight:500 }}>{MORNING_LBLS[v]}</div>
            </button>
          ))}
        </div>
      </Card>

      <Card title="Fatigue" emoji="🪫">
        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:10 }}>
          <span style={{ fontSize:13, color:"#7a7069" }}>How tired do you feel today?</span>
          <span style={{ fontSize:13, fontWeight:600, color:pf(log.fatigue) }}>
            {["–","Very Little","Mild","Moderate","Heavy","Exhausted"][log.fatigue] ?? "–"}
          </span>
        </div>
        <ScaleDots value={log.fatigue} onChange={v=>setLog(p=>({...p, fatigue:v}))}/>
      </Card>

      <Card title="Skin / Psoriasis" emoji="✨">
        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:10 }}>
          <span style={{ fontSize:13, color:"#7a7069" }}>How severe is the psoriasis today?</span>
          <span style={{ fontSize:13, fontWeight:600, color:pf(log.skinFlare) }}>
            {["None","Very Mild","Mild","Moderate","Severe","Very Severe"][log.skinFlare]}
          </span>
        </div>
        <ScaleDots value={log.skinFlare} onChange={v=>setLog(p=>({...p, skinFlare:v}))}/>
      </Card>

      <Card title="Joint Symptoms" emoji="🦴">
        <p style={{ fontSize:13, color:"#9a9189", margin:"0 0 12px" }}>Tap a joint to rate pain (0–5) or mark as swollen</p>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
          {JOINTS.map(j => {
            const pain    = log.joints[j.id] || 0;
            const swollen = log.swelling?.[j.id];
            const open    = openJoint === j.id;
            return (
              <div key={j.id} style={{ borderRadius:10, overflow:"hidden",
                border:`1.5px solid ${pain>0 ? pf(pain)+"50" : "#E2D9CE"}`,
                background:pb(pain) }}>
                <button onClick={() => setOpenJoint(open ? null : j.id)} style={{
                  width:"100%", background:"none", border:"none", cursor:"pointer",
                  padding:"9px 12px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span style={{ fontSize:12, fontWeight:600, color:"#1e3d2f" }}>{j.label}</span>
                  <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                    {swollen && <span style={{ fontSize:9, background:"#3B82F6", color:"#fff", borderRadius:4, padding:"1px 5px" }}>swollen</span>}
                    {pain>0  && <span style={{ fontSize:12, fontWeight:800, color:pf(pain) }}>{pain}</span>}
                    <span style={{ fontSize:11, color:"#9a9189" }}>{open?"▲":"▼"}</span>
                  </div>
                </button>
                {open && (
                  <div style={{ padding:"0 12px 12px", borderTop:"1px solid #E2D9CE" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", paddingTop:10, marginBottom:8 }}>
                      {[0,1,2,3,4,5].map(v => (
                        <button key={v}
                          onClick={() => setLog(p=>({...p, joints:{...p.joints,[j.id]:v}}))}
                          style={{ width:34, height:34, borderRadius:8,
                            border:`2px solid ${pain===v?pf(v):"transparent"}`,
                            background:pb(v), cursor:"pointer", fontWeight:800, fontSize:13, color:pf(v) }}>{v}</button>
                      ))}
                    </div>
                    <button onClick={() => setLog(p=>({...p, swelling:{...p.swelling,[j.id]:!p.swelling?.[j.id]}}))}
                      style={{ width:"100%", padding:"6px 0", borderRadius:7,
                        border:"1.5px solid #3B82F6",
                        background:swollen?"#3B82F6":"#fff", color:swollen?"#fff":"#3B82F6",

                    </button>

  );

// ─── Insights Tab ─────────────────────────────────────────────────────────────

function InsightsTab({ logs, onEditEntry, onAddMissedDay }) {
  const n = logs.length;
  if (n < 5) return (
    <div style={{ padding:"40px 0" }}>
      <div style={{ textAlign:"center", marginBottom:24 }}>
        <div style={{ fontSize:52, marginBottom:14 }}>📊</div>
        <div style={{ fontFamily:"'Lora',serif", fontSize:20, color:"#1e3d2f", marginBottom:8 }}>Building your picture…</div>
        <div style={{ fontSize:14, color:"#9a9189", lineHeight:1.7, maxWidth:280, margin:"0 auto" }}>
          Insights unlock after 5 entries. You have {n} so far — keep logging!
        </div>
      </div>
      <Card style={{ background:"#F5F0EB", border:"none" }}>
        <div style={{ fontFamily:"'Lora',serif", fontWeight:700, marginBottom:8, color:"#1e3d2f" }}>What you'll see</div>
        <ul style={{ margin:0, padding:"0 0 0 18px", fontSize:13, color:"#7a7069", lineHeight:2 }}>
          <li>Pain trend over time</li>
          <li>Which foods correlate with worse days</li>
          <li>Impact of exercise, alcohol &amp; sleep</li>
          <li>Most consistently affected joints</li>
        </ul>
      </Card>
    </div>
  );

  const avge = arr => arr.length ? arr.reduce((s,x)=>s+x,0)/arr.length : null;
  const fmt  = v => v===null ? "–" : v.toFixed(1);

  // ─── Lag analysis helpers ─────────────────────────────────────────────────
  // Triggers in PsA often affect symptoms 1-3 days later, not same-day.
  // We check lags 0, 1, 2 days and report the strongest signal for each trigger.

  const byDate = {};
  logs.forEach(l => { byDate[l.date] = l; });

  const addDays = (dateStr, days) => {
    const d = new Date(dateStr + "T12:00:00");
    d.setDate(d.getDate() + days);
    return d.toISOString().split("T")[0];
  };

  const lagLabel = lag => lag === 0 ? "same day" : lag === 1 ? "next day" : `${lag} days later`;

  // Returns the lag (0–2) with the strongest pain effect for a given predicate
  const computeLagInsight = (predicate) => {
    const results = [0,1,2].map(lag => {
      const yes = [], no = [];
      logs.forEach(l => {
        const target = byDate[addDays(l.date, lag)];
        if (!target) return;          // missing day — can't compare
        (predicate(l) ? yes : no).push(target.overallPain);
      });
      if (yes.length < 3 || no.length < 3) return null;
      const a = avge(yes), b = avge(no);
      return { lag, diff: +(a-b).toFixed(1), nYes: yes.length, nNo: no.length };
    }).filter(Boolean);
    if (!results.length) return null;
    return results.reduce((best, r) => Math.abs(r.diff) > Math.abs(best.diff) ? r : best);
  };

  const trend = logs.slice(-21).map(l=>({ date:l.date.slice(5), pain:l.overallPain }));

  // Multi-metric trend (pain, fatigue, skin) over last 21 days
  const fatigueAvg = avge(logs.map(l=>l.fatigue||0));
  const skinAvg    = avge(logs.map(l=>l.skinFlare||0));

  // Morning soreness breakdown
  const morningCounts = [0,0,0,0];
  logs.forEach(l => { if (l.morning>=0 && l.morning<=3) morningCounts[l.morning]++; });
  const morningLogged = morningCounts[1] + morningCounts[2] + morningCounts[3];

  // Skin <-> joint correlation: does pain rise on skin flare days?
  const skinFlareDays   = logs.filter(l=>(l.skinFlare||0)>=2);
  const noSkinFlareDays = logs.filter(l=>(l.skinFlare||0)<2);
  const painOnSkin      = avge(skinFlareDays.map(l=>l.overallPain));
  const painOffSkin     = avge(noSkinFlareDays.map(l=>l.overallPain));

  // ─── Trend direction: rolling 28-day windows ──────────────────────────────
  // Compares the last 28 days (excluding today) against the 28 days before that.
  // - State 1 (<14 entries): hidden entirely
  // - State 2 (14–55 entries): "warming up" placeholder
  // - State 3 (56+ entries): real comparison

  const today = todayStr();
  const inWindow = (dateStr, fromDaysAgo, toDaysAgo) => {
    // fromDaysAgo > toDaysAgo (e.g. from=28, to=1 means days -1 to -28)
    const d = new Date(dateStr+"T12:00:00");
    const t = new Date(today+"T12:00:00");
    const diffDays = Math.round((t-d) / 86400000);
    return diffDays >= toDaysAgo && diffDays <= fromDaysAgo;
  };

  const recentEntries = logs.filter(l => inWindow(l.date, 28, 1));
  const priorEntries  = logs.filter(l => inWindow(l.date, 56, 29));

  const trendMetrics = [
    { key:"overallPain", label:"Pain",    color:pf(3), bg:pb(3) },
    { key:"fatigue",     label:"Fatigue", color:"#6A4C93", bg:"#EFE6F5" },
    { key:"skinFlare",   label:"Skin",    color:"#B85C38", bg:"#FFF0E8" },
    { key:"morning",     label:"Morning", color:"#E65100", bg:"#FFF3E0", max:3 },
  ].map(m => {
    const r = avge(recentEntries.map(l => l[m.key]||0));
    const p = avge(priorEntries.map(l => l[m.key]||0));
    if (r===null || p===null) return null;
    const diff = +(r-p).toFixed(2);
    // direction: stable if abs(diff) < 0.3 (or 0.2 for morning since scale is smaller)
    const threshold = m.max===3 ? 0.2 : 0.3;
    const dir = Math.abs(diff) < threshold ? "stable" : (diff < 0 ? "improving" : "worsening");
    return { ...m, recent:+r.toFixed(1), prior:+p.toFixed(1), diff, dir };
  }).filter(Boolean);

  const trendDataReliable = recentEntries.length >= 14 && priorEntries.length >= 14;

  const foodInsights = ALL_FOODS.map(food => {
    const best = computeLagInsight(l => (l.foods||[]).includes(food.id));
    return best ? { ...food, ...best } : null;
  }).filter(Boolean).sort((a,b) => Math.abs(b.diff) - Math.abs(a.diff));

  const exDays   = logs.filter(l=>l.exercise&&l.exercise!=="None");
  const noExDays = logs.filter(l=>!l.exercise||l.exercise==="None");
  const exAvg    = avge(exDays.map(l=>l.overallPain));
  const noExAvg  = avge(noExDays.map(l=>l.overallPain));

  const alcDays   = logs.filter(l=>(l.alcohol||0)>0);
  const noAlcDays = logs.filter(l=>(l.alcohol||0)===0);
  const alcAvg    = avge(alcDays.map(l=>l.overallPain));
  const noAlcAvg  = avge(noAlcDays.map(l=>l.overallPain));
  // Lag analysis for alcohol — known to often hit 24-48h later
  const alcLag    = computeLagInsight(l => (l.alcohol||0) > 0);

  const sleepBins = [
    {label:"< 6h", data:logs.filter(l=>l.sleep<6)},
    {label:"6–8h", data:logs.filter(l=>l.sleep>=6&&l.sleep<=8)},
    {label:"8h+",  data:logs.filter(l=>l.sleep>8)},
  ].map(b=>({label:b.label, avg:avge(b.data.map(l=>l.overallPain)), n:b.data.length})).filter(b=>b.n>0);

  const jointTotals = {};
  logs.forEach(l=>Object.entries(l.joints||{}).forEach(([id,pain])=>{
    if(!jointTotals[id]) jointTotals[id]=[];
    jointTotals[id].push(pain);
  }));
  const topJoints = JOINTS
    .map(j=>({...j, avg:avge(jointTotals[j.id]||[])}))
    .filter(j=>j.avg!==null&&j.avg>0)
    .sort((a,b)=>b.avg-a.avg).slice(0,6);

  const SB = ({label, value, sub, color="#2C5F4A", bg="#E8F5E9"}) => (
    <div style={{ flex:1, background:bg, borderRadius:12, padding:"14px 12px", textAlign:"center" }}>
      <div style={{ fontSize:26, fontWeight:800, fontFamily:"'Lora',serif", color, lineHeight:1 }}>{value}</div>
      <div style={{ fontSize:12, color, marginTop:4, fontWeight:600 }}>{label}</div>
      {sub && <div style={{ fontSize:11, color:"#9a9189", marginTop:2 }}>{sub}</div>}
    </div>
  );

  return (
    <div>
      <Card title="Pain Trend" emoji="📈">
        <div style={{ fontSize:12, color:"#9a9189", marginBottom:10 }}>Last {trend.length} days logged</div>
        <SimpleLineChart data={trend}/>
      </Card>

      <Card title="Calendar View" emoji="🗓️">
        <CalendarHeatmap logs={logs} onEditEntry={onEditEntry} onAddMissedDay={onAddMissedDay}/>
      </Card>

      {/* Trend Direction — three states */}
      {n >= 14 && !trendDataReliable && (
        <Card title="Trend Direction" emoji="📈" style={{ background:"#F5F0EB", border:"1.5px dashed #C9BBAB" }}>
          <p style={{ fontSize:13, color:"#1e3d2f", lineHeight:1.6, margin:"0 0 10px" }}>
            This card unlocks at <strong>8 weeks of data</strong>, so we can fairly compare your last month against the previous month.
          </p>
          <div style={{ background:"#fff", borderRadius:9, padding:"10px 12px", marginBottom:10 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
              <span style={{ fontSize:12, color:"#7a7069" }}>Progress</span>
              <span style={{ fontSize:12, fontWeight:700, color:"#2C5F4A" }}>{n} / 56 days</span>
            </div>
            <div style={{ height:8, background:"#F0E8E0", borderRadius:4, overflow:"hidden" }}>
              <div style={{ width:`${Math.min(100,(n/56)*100)}%`, height:"100%",
                background:"linear-gradient(to right,#81C784,#2C5F4A)", borderRadius:4, transition:"width .3s" }}/>
            </div>
          </div>
          <p style={{ fontSize:12, color:"#9a9189", margin:0, fontStyle:"italic" }}>
            About <strong>{Math.max(1, 56-n)} more day{56-n===1?"":"s"}</strong> of logging to go. Once unlocked, you'll see whether pain, fatigue, skin and morning soreness are trending better or worse than the previous month.
          </p>
        </Card>
      )}

      {trendDataReliable && (
        <Card title="Trend Direction" emoji="📈">
          <p style={{ fontSize:12, color:"#9a9189", margin:"0 0 14px", lineHeight:1.6 }}>
            Last 28 days vs the previous 28 days. <span style={{ color:"#2C5F4A", fontWeight:600 }}>↘ improving</span> · <span style={{ color:"#9a9189" }}>→ stable</span> · <span style={{ color:"#C62828", fontWeight:600 }}>↗ worsening</span>
          </p>
          {trendMetrics.map(m => {
            const arrow = m.dir === "improving" ? "↘" : m.dir === "worsening" ? "↗" : "→";
            const arrowColor = m.dir === "improving" ? "#2C5F4A" : m.dir === "worsening" ? "#C62828" : "#9a9189";
            return (
              <div key={m.key} style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 0",
                borderBottom:"1px solid #F0E8E0" }}>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13, fontWeight:600, color:"#1e3d2f" }}>{m.label}</div>
                  <div style={{ fontSize:11, color:"#9a9189", marginTop:2 }}>
                    {m.recent} now · {m.prior} prior month
                  </div>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <span style={{ fontSize:22, fontWeight:800, color:arrowColor, lineHeight:1 }}>{arrow}</span>
                  <div style={{ textAlign:"right", minWidth:54 }}>
                    <div style={{ fontSize:14, fontWeight:700, color:arrowColor, lineHeight:1 }}>
                      {m.diff>0?"+":""}{m.diff}
                    </div>
                    <div style={{ fontSize:10, color:"#9a9189", marginTop:3, textTransform:"capitalize" }}>{m.dir}</div>
                  </div>
                </div>
              </div>
            );
          })}
          <div style={{ fontSize:12, color:"#9a9189", fontStyle:"italic", marginTop:10, lineHeight:1.5 }}>
            Based on {recentEntries.length} recent vs {priorEntries.length} prior days. Differences below 0.3 are treated as stable noise.
          </div>
        </Card>
      )}

      <Card title="Daily Averages" emoji="🌡️">
        <div style={{ display:"flex", gap:10 }}>
          <SB label="Pain"    value={fmt(avge(logs.map(l=>l.overallPain)))} sub="overall" color={pf(3)} bg={pb(3)}/>
          <SB label="Fatigue" value={fmt(fatigueAvg)} sub="0–5" color="#6A4C93" bg="#EFE6F5"/>
          <SB label="Skin"    value={fmt(skinAvg)}    sub="flare" color="#B85C38" bg="#FFF0E8"/>
        </div>
      </Card>

      {morningLogged >= 3 && (
        <Card title="Morning Soreness" emoji="🌅">
          <div style={{ display:"flex", gap:10, marginBottom:12 }}>
            {[1,2,3].map(v => (
              <SB key={v}
                label={MORNING_LBLS[v]}
                value={morningCounts[v]}
                sub={`${Math.round(morningCounts[v]/morningLogged*100)}% of days`}
                color={MORNING_FG[v]} bg={MORNING_BG[v]}/>
            ))}
          </div>
          <div style={{ fontSize:12, color:"#9a9189", fontStyle:"italic" }}>
            Rheumatologists ask about morning stiffness at every appointment — these numbers are useful to share.
          </div>
        </Card>
      )}

      {painOnSkin!==null && painOffSkin!==null && skinFlareDays.length>=2 && (
        <Card title="Skin & Joint Connection" emoji="✨">
          <div style={{ display:"flex", gap:10, marginBottom:12 }}>
            <SB label="On skin flare days"  value={fmt(painOnSkin)}  sub={`${skinFlareDays.length} days`} color="#B85C38" bg="#FFF0E8"/>
            <SB label="On clear-skin days"  value={fmt(painOffSkin)} sub={`${noSkinFlareDays.length} days`} color="#2C5F4A" bg="#E8F5E9"/>
          </div>
          {painOnSkin > painOffSkin + 0.3 && (
            <div style={{ padding:12, background:"#FFF0E8", borderRadius:9, fontSize:13, color:"#1e3d2f", lineHeight:1.6 }}>
              💡 Joint pain runs {(painOnSkin-painOffSkin).toFixed(1)} points higher when skin is flaring — they appear linked.
            </div>
          )}
        </Card>
      )}

      {topJoints.length>0 && (
        <Card title="Most Affected Joints" emoji="🦴">
          {topJoints.map(j=>(
            <div key={j.id} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
              <span style={{ fontSize:12, flex:1, color:"#1e3d2f", fontWeight:500 }}>{j.label}</span>
              <div style={{ flex:2, height:8, background:"#F0E8E0", borderRadius:4, overflow:"hidden" }}>
                <div style={{ width:`${(j.avg/5)*100}%`, height:"100%",
                  background:"linear-gradient(to right,#81C784,#EF5350)", borderRadius:4 }}/>
              </div>
              <span style={{ fontSize:13, fontWeight:800, color:pf(Math.round(j.avg)), width:26, textAlign:"right" }}>{j.avg.toFixed(1)}</span>
            </div>
          ))}
        </Card>
      )}

      {exAvg!==null&&noExAvg!==null&&(
        <Card title="Exercise Impact" emoji="🏃">
          <div style={{ display:"flex", gap:10, marginBottom:12 }}>
            <SB label="With exercise"    value={fmt(exAvg)}   sub={`${exDays.length} days`}   color="#2C5F4A" bg="#E8F5E9"/>
            <SB label="Without exercise" value={fmt(noExAvg)} sub={`${noExDays.length} days`} color="#E65100" bg="#FFF3E0"/>
          </div>
          <div style={{ padding:12, background:"#F5F0EB", borderRadius:9, fontSize:13, color:"#1e3d2f", lineHeight:1.6 }}>
            {exAvg<noExAvg ? `💡 Pain averages ${(noExAvg-exAvg).toFixed(1)} points lower on exercise days. Movement seems to help!`
              : exAvg>noExAvg ? `⚠️ Pain is slightly higher on exercise days — could be post-activity soreness. Worth mentioning to your rheumatologist.`
              : `➡️ No significant difference yet between exercise and rest days.`}
          </div>
        </Card>
      )}

      {alcAvg!==null&&noAlcAvg!==null&&alcDays.length>=2&&(
        <Card title="Alcohol Impact" emoji="🍷">
          <div style={{ display:"flex", gap:10, marginBottom: alcLag ? 12 : 0 }}>
            <SB label="Alcohol days" value={fmt(alcAvg)}   sub={`${alcDays.length} days`}
              color={alcAvg>noAlcAvg?"#C62828":"#2C5F4A"} bg={alcAvg>noAlcAvg?"#FFEBEE":"#E8F5E9"}/>
            <SB label="No alcohol"   value={fmt(noAlcAvg)} sub={`${noAlcDays.length} days`} color="#2C5F4A" bg="#E8F5E9"/>
          </div>
          {alcLag && Math.abs(alcLag.diff) >= 0.3 && (
            <div style={{ padding:12, background: alcLag.diff>0 ? "#FFEBEE" : "#E8F5E9",
              borderRadius:9, fontSize:13, color:"#1e3d2f", lineHeight:1.6 }}>
              {alcLag.diff > 0 ? "⚠️" : "💡"} Strongest effect: pain runs <strong>{alcLag.diff>0?"+":""}{alcLag.diff}</strong> points {lagLabel(alcLag.lag)} after drinking.
            </div>
          )}
        </Card>
      )}

      {sleepBins.length>=2&&(
        <Card title="Sleep & Pain" emoji="😴">
          <div style={{ display:"flex", gap:10 }}>
            {sleepBins.map(b=><SB key={b.label} label={b.label} value={fmt(b.avg)} sub={`${b.n} nights`} color="#2C5F4A" bg="#E8F5E9"/>)}
          </div>
        </Card>
      )}

      {foodInsights.length>0&&(
        <Card title="Food Correlations" emoji="🍽️">
          <p style={{ fontSize:12, color:"#9a9189", margin:"0 0 12px", lineHeight:1.6 }}>
            Each food is checked for effects on pain <strong>same-day, next-day, and 2 days later</strong> — the strongest signal is shown. Positive = higher pain, negative = lower.
          </p>
          {foodInsights.slice(0,8).map(f=>(
            <div key={f.id} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
              <span style={{ fontSize:13, width:22, textAlign:"center" }}>{f.emoji}</span>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:12, color:"#1e3d2f" }}>{f.label}</div>
                <div style={{ fontSize:10, color:"#9a9189", marginTop:1 }}>
                  {lagLabel(f.lag)} · {f.nYes} day{f.nYes===1?"":"s"}
                </div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <div style={{ width:60, height:6, background:"#F0E8E0", borderRadius:3, overflow:"hidden" }}>
                  <div style={{ width:`${Math.min(100,Math.abs(f.diff)/2*100)}%`, height:"100%",
                    background:f.diff>0?"#EF5350":"#4CAF50", borderRadius:3 }}/>
                </div>
                <span style={{ fontSize:13, fontWeight:700, minWidth:36, textAlign:"right",
                  color:f.diff>0.2?"#C62828":f.diff<-0.2?"#2C5F4A":"#9a9189" }}>
                  {f.diff>0?"+":""}{f.diff}
                </span>
              </div>
            </div>
          ))}
          <div style={{ fontSize:12, color:"#9a9189", fontStyle:"italic", marginTop:8, lineHeight:1.5 }}>
            Based on {n} entries. Foods with fewer than 3 days of data either way are hidden. Aim for 4+ weeks of consistent logging for reliable patterns.
          </div>
        </Card>
      )}

      <Card style={{ background:"#F5F0EB", border:"none" }}>
        <div style={{ fontFamily:"'Lora',serif", fontWeight:700, color:"#1e3d2f", marginBottom:6 }}>📋 Share with your doctor</div>
        <div style={{ fontSize:13, color:"#7a7069", lineHeight:1.7 }}>
          These are statistical patterns, not medical advice. Share them with your rheumatologist — they can help interpret what the data means for your specific situation.
        </div>
      </Card>
    </div>
  );
}

// ─── App Root ─────────────────────────────────────────────────────────────────

function PsATracker() {
  const [tab,     setTab]     = useState("log");
  const [log,     setLog]     = useState(emptyLog());
  const [logs,    setLogs]    = useState([]);
  const [saveMsg, setSaveMsg] = useState("");

  useEffect(() => {
    const stored = readLogs();
    if (stored.length) {
      setLogs(stored);
      const todayEntry = stored.find(l => l.date === todayStr());
      if (todayEntry) setLog(todayEntry);
    }
  }, []);

  const onSave = () => {
    const entry   = { ...log };   // log.date may be today or a past date being edited
    const updated = [...logs.filter(l => l.date !== entry.date), entry]
                      .sort((a,b) => a.date.localeCompare(b.date));
    writeLogs(updated);
    setLogs(updated);
    setSaveMsg("Saved ✓");
    setTimeout(() => setSaveMsg(""), 2500);
  };

  const onEditEntry = (date) => {
    const entry = logs.find(l => l.date === date);
    if (!entry) return;
    // Merge with emptyLog to ensure new fields exist on old entries
    setLog({ ...emptyLog(), ...entry });
    setTab("log");
    window.scrollTo({ top:0, behavior:"smooth" });
  };

  const onAddMissedDay = (date) => {
    if (!date) return;
    if (date > todayStr()) { alert("You can't add an entry for a date in the future."); return; }
    const existing = logs.find(l => l.date === date);
    if (existing) {
      // Date already has an entry — just open it for editing
      onEditEntry(date);
      return;
    }
    setLog({ ...emptyLog(), date });
    setTab("log");
    window.scrollTo({ top:0, behavior:"smooth" });
  };

  const onDeleteEntry = (date) => {
    if (!confirm(`Delete the entry for ${new Date(date+"T12:00:00").toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"})}? This can't be undone.`)) return;
    const updated = logs.filter(l => l.date !== date);
    writeLogs(updated);
    setLogs(updated);
    // If we were editing the deleted entry, reset the form
    if (log.date === date) setLog(emptyLog());
  };

  const onResetToToday = () => {
    const todayEntry = logs.find(l => l.date === todayStr());
    setLog(todayEntry ? { ...emptyLog(), ...todayEntry } : emptyLog());
  };

  const onExport = () => {
    const blob = new Blob([JSON.stringify(logs, null, 2)], { type:"application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = `psa-journal-${todayStr()}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  const onImport = file => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const imported = JSON.parse(e.target.result);
        if (!Array.isArray(imported)) throw new Error();
        const merged = Object.values(
          [...logs, ...imported].reduce((acc,l) => ({ ...acc, [l.date]:l }), {})
        ).sort((a,b) => a.date.localeCompare(b.date));
        writeLogs(merged);
        setLogs(merged);
        const todayEntry = merged.find(l => l.date === todayStr());
        if (todayEntry) setLog(todayEntry);
        alert(`Imported ${imported.length} entries.`);
      } catch { alert("Could not read file. Please use a valid PsA Journal backup."); }
    };
    reader.readAsText(file);
  };

  return (
    <div style={{ maxWidth:480, margin:"0 auto", minHeight:"100vh", background:"#FAF7F2" }}>
      <header style={{ background:"linear-gradient(135deg,#1e3d2f 0%,#2C5F4A 100%)",
        padding:"22px 20px 18px", display:"flex", justifyContent:"space-between", alignItems:"flex-end" }}>
        <div>
          <div style={{ fontFamily:"'Lora',serif", fontSize:26, fontWeight:800, color:"#fff", letterSpacing:.3, lineHeight:1 }}>PsA Journal</div>
          <div style={{ fontSize:12, color:"rgba(255,255,255,.65)", marginTop:4, letterSpacing:.4 }}>Psoriatic Arthritis Tracker</div>
        </div>
        <div style={{ textAlign:"right" }}>
          <div style={{ fontSize:13, color:"rgba(255,255,255,.85)" }}>
            {new Date().toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short",year:"numeric"})}
          </div>
          <div style={{ fontSize:11, color:"rgba(255,255,255,.5)", marginTop:2 }}>
            {logs.length} entr{logs.length===1?"y":"ies"} logged
          </div>
        </div>
      </header>

      <nav style={{ display:"flex", background:"#fff", borderBottom:"1px solid #ECE5DC",
        position:"sticky", top:0, zIndex:100, boxShadow:"0 2px 8px rgba(0,0,0,.06)" }}>
        {[["log","📋 Today"],["history","📅 History"],["insights","📊 Insights"]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{
            flex:1, padding:"12px 4px", border:"none",
            borderBottom:`2.5px solid ${tab===id?"#2C5F4A":"transparent"}`,
            background:"#fff", cursor:"pointer", fontSize:13,
            fontWeight:tab===id?600:400,
            color:tab===id?"#2C5F4A":"#9a9189", transition:"all .15s",
          }}>{label}</button>
        ))}
      </nav>

      <main style={{ padding:"16px 16px 0" }}>
        {tab==="log"      && <LogTab      log={log} setLog={setLog} onSave={onSave} saveMsg={saveMsg} onResetToToday={onResetToToday} logs={logs}/>}
        {tab==="history"  && <HistoryTab  logs={logs} onExport={onExport} onImport={onImport} onEditEntry={onEditEntry} onDeleteEntry={onDeleteEntry} onAddMissedDay={onAddMissedDay}/>}
        {tab==="insights" && <InsightsTab logs={logs} onEditEntry={onEditEntry} onAddMissedDay={onAddMissedDay}/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PsATracker />);
</script>
</body>
</html>
